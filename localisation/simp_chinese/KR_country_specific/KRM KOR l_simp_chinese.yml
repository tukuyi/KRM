 NKRsichuanpuppet.74.t: "汉城来电"
 NKRsichuanpuppet.74.d: "自朝鲜半岛获得解放以来，新生的有汉朝鲜国便始终处于一种奇特而危险的民族狂热之中。长期的殖民统治、统一战争以及接连不断的政治宣传，使许多朝鲜民族主义者坚信他们的国家肩负着某种复仇的历史使命。\n\n今日清晨，我国外交部收到了一封来自汉城的电报。电文由朝鲜王室方面直接发出，其中详细阐述了一项所谓“彻底解决日本问题”的长期战略构想。在这份长达数十页的计划书中，朝鲜方面宣称：只要能够在未来彻底吞并日本列岛，逆向复刻“内鲜一体”的往事，那么东亚便将永远不会再次受到日本帝国主义的威胁。\n\n更令人瞠目结舌的是，朝鲜方面甚至已经开始认真讨论对日总督设置及大规模人口再教育计划。一些激进派人士还公开主张应当将东京改造成东方和平纪念都市，以警示后世永远不得重蹈侵略战争的覆辙。\n\n尽管朝鲜王室强调这仅仅只是构想，但显而易见的是汉城方面已经有不少人开始认真对待这一近乎疯狂的计划。如今，[ROOT.GetLeader]必须决定我们究竟该如何回应这份荒诞而危险的提案。"
 NKRsichuanpuppet.74.a: "何尝不可？"
 NKRsichuanpuppet.74.b: "你在想啥？！"

 KOR_so_taesan: "少太山"
 KOR_so_taesan_desc: "§Y生于：§!§L1891年5月5日；朝鲜、全罗南道灵光郡吉龙里§!\n§Y背景：§!§L朴重彬，别号少太山，被信众尊称为“大宗师”。他出身于一户平凡农家，自七岁起便对自然现象与人生真谛存有异于常人的探求心。历经二十载求道苦行，他于1916年4月28日终获“大觉”，这一日也成为了圆佛教的开教之始。\n\n朴重彬感于物质文明的飞速发展，提出了“物质开辟，精神开辟”的宏伟口号。他不仅是一位宗教改革者，更是一位社会实业家。在教团创立之初，他带领弟子们在灵光郡开展了规模宏大的“防筑工程”，开垦了数万坪荒地，通过经济自给奠定了教团根基。他极力倡导破除迷信、消灭文盲以及储蓄组合运动，试图将深奥的佛法转化为生活化、大众化的真理，力主“灵肉双全”的修行准则。\n\n作为一代宗师，朴重彬摒弃了传统的佛像崇拜，改以象征宇宙真理的“一圆相”作为最高信仰。他秉持“同源道理”的博爱精神，致力于实现宗教间的和平与人类的共同救赎，在混乱的半岛近代局势中，为民众开辟出了一条通往精神觉醒的新路径。§!"
 KOR_cha_yunhong: "车京石"
 KOR_cha_yunhong_desc: "§Y生于：§!§L1880年7月7日；朝鲜国、全罗道高敞县§!\n§Y背景：§!§L车京石，本名轮洪，号月谷。他的父亲车致九是东学党运动的领袖之一，在火刑中壮烈牺牲，这一悲剧在他少年心中种下了反抗的种子。1907年，车京石结识了甑山教始祖姜一淳并成为其核心弟子。在姜氏去世后，他于1910年接掌教权，创立了普天教，并被信众尊称为“车天子”。\n\n在日据时代的黑暗时期，车京石利用其高超的组织能力，将普天教发展成拥有数百万信徒的庞大组织。他不仅在宗教上建立了一套完整的“六十方州”管理体系，更在政治上公开对抗日本殖民者。1921年，他举行高天祭，宣布建立名为“时国”的独立政权，并自任皇帝，这种公然蔑视日帝统治的行为使其成为日警的“甲种监视对象”。\n\n尽管身处宗教迷信的争议中，车京石却是韩国独立运动最重要的幕后资助者之一。他曾秘密向上海大韩民国临时政府输送巨额经费，并向金佐镇的北路军政署提供军款，其资助总额甚至占到了当时独立运动资金的一半以上。他在朝鲜半岛通过创办报刊、推动物产奖励运动等方式，在民众中播撒民族独立的火种。\n\n车京石是一位复杂的领袖：他既是信众眼中救世的“天子”，也是日帝眼中危险的“邪教首领”，更是独立运动家们眼中不可或缺的经济支柱。§!"
 KOR_yi_wu: "李鍝"
 KOR_yi_wu_desc: "§Y生于：§!§L1912年11月15日；大韩帝国、汉城府钟路区§!\n§Y背景：§!§L李鍝，字念石，号尚云，是大韩帝国高宗皇帝之孙、义亲王李堈的次子。由于兴宣大院君的长孙李埈镕膝下无子，李鍝于1917年入继为养子，正式成为云岘宫的第四代宗主，并世袭“公”之位。\n\n尽管自幼被强制送往日本接受殖民教育，并先后毕业于日本陆军士官学校与陆军大学，但李鍝在皇室成员中以顽强的反日立场著称。他曾不顾日本宫内省的威逼利诱，坚决拒绝迎娶日本皇族，并在朴永孝的周旋下毅然与朝鲜女子朴赞珠成婚。在军旅生涯中，他常因流露民族主义情绪、坚持使用朝鲜语以及同情独立运动而被日方视为“叛逆”的监视对象。\n\n如今，随着中国君主制势力解放朝鲜，李鍝被推选为新生君主制朝鲜国的君主，在新生的旧秩序下享有不征之国的独立。§!"

