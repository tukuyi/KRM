 KOR_legitimacy_KMD: "临政法统：§n孔孟之邦§!"
 KOR_legitimacy_KMD_desc: "朝鲜民族已从长期殖民压迫与思想混乱中重新站起。如今，在孔孟道与诸位贤达的领导下，国家终于重新寻回了属于东方文明的真正秩序。西方自由主义的放纵、工团主义的疯狂以及日本殖民者遗留下的腐朽思想，都无法再继续腐蚀朝鲜人民的精神。\n\n一个真正强大的国家绝非建立在盲目的工业扩张或无节制的个人自由之上，而应建立于礼义廉耻与上下有序的社会结构之中。唯有重建伦理、恢复纲常，并使人民重新理解何谓忠孝仁义，朝鲜方能摆脱近代以来的苦难与混乱。\n\n如今，新的时代已经到来。朝鲜不再只是列强夹缝中的弱小民族，而将作为真正继承东方文明道统的国家，再度屹立于世界。"
 KOR_legitimacy_LCX: "临政法统：§c东方小中华§!"
 KOR_legitimacy_LCX_desc: "朝鲜终于摆脱了长期的殖民统治，并重新回归属于自己的文明道路。在新的政府看来，朝鲜绝不能继续盲目模仿西方列强，也不能沉溺于危险而狂热的革命思想。真正属于朝鲜的未来，应当建立在东方文明共同的文化根基之上。\n\n数百年以来，朝鲜一直被誉为“东方礼仪之国”，而如今，国家将再次承担起维护东方文明秩序的责任。唯有继承儒家伦理、重建传统社会结构，并与中华文明世界保持紧密联系，朝鲜才能在新时代中获得真正的繁荣与稳定。朝鲜并非西方国家拙劣的复制品，而是东方文明在近代世界中的延续与重生。新的朝鲜将以属于自己的方式，走向独立、自强与复兴。"
 KOR_legitimacy_JSP: "临政法统：§a圆佛一体§!"
 KOR_legitimacy_JSP_desc: "在经历了长期的殖民压迫与社会动荡后，朝鲜人民终于重新寻得了真正的精神归宿。少太山大宗师所开创的圆佛教不仅为人民带来了内心的安宁，也为国家指出了一条超越旧时代纷争的新道路。\n\n圆佛教认为，物质文明的进步若缺乏精神修养的约束，最终只会导致混乱与堕落。因此，国家必须同时推进“物质开辟”与“精神开辟”，让人民在建设富强国家的同时，也完成自身心灵的觉醒。\n\n在教团与政府的共同努力下，朝鲜正在逐步建立一个真正实现灵肉双全、上下和谐的新社会。那些沉迷于西方资本主义享乐或革命暴力幻想的人终将明白，唯有圆佛一体之道，才能为朝鲜带来真正持久的和平与繁荣。"
 KOR_legitimacy_LCY: "临政法统：§n车天子之治§!"
 KOR_legitimacy_LCY_desc: "朝鲜人民曾长期生活在殖民统治、贫困与混乱之中，而如今，车天子终于为这个苦难深重的民族带来了真正的救赎。普天教的旗帜已经飘扬于全国，各地人民也终于重新理解了何谓真正属于朝鲜民族的天命与秩序。\n\n在许多人看来，现代世界早已被腐败、物欲与外来思想彻底污染。那些所谓的民主政客、资本家以及革命煽动者，不过是一群试图将朝鲜再次拖入灾难的骗子而已。唯有在车天子的领导下，国家才能重新统一意志，并以真正属于民族自身的方式迈向未来。\n\n如今，新的“时国”已经开始建立。六十方州将如同一体般共同运作，所有忠诚于国家与教团的人都将获得属于自己的位置，而那些拒绝接受新时代的人，则终将被历史所抛弃。"
 KOR_korean_corporatism_idea: "大韩法团主义"
 KOR_korean_corporatism_idea_desc: "长期的殖民压迫与资本无序扩张早已证明单纯模仿西方经济制度并不能拯救朝鲜。国家必须建立一种真正符合民族现实的新体制，使劳工、企业、军队与政府能够在统一秩序下共同协作。\n\n在大韩法团主义体系下，阶级斗争与无意义的党派争执被视为破坏国家团结的危险行为。取而代之的则是由国家统一协调各行业与社会组织，使所有人都能够为民族复兴这一共同目标服务。"
 KOR_sixty_as_one_idea: "六十为一"
 KOR_sixty_as_one_idea_desc: "普天教所建立的“六十方州”体系，早已不仅仅只是单纯的宗教组织，而是维系整个国家运作的重要基础。通过严密的地方网络与高度统一的组织结构，教团成功将分散而混乱的社会重新整合为一个整体。\n\n在这一体系之下，地方、教团与国家之间不再存在明确界限。所有人都必须服从共同的意志，并为实现民族复兴与国家统一而贡献自身力量。\n\n六十方州虽分布于全国，但其精神与目标却始终如一。正所谓：六十为一，万众归心。"

