 KMD_BREAK_DYD: "邓演达国策树"
 DYD_invisible: "无形之人"
 DYD_invisible_desc: "在所有人的视线之外，在历史的盲区之中，一支沉默的力量正在悄然集结。邓演达这个被所有人以为已经死去的名字——此刻正如幽灵般重新出现在华东的废墟之上。没有高调的宣言，没有慷慨的演说，甚至没有一面正式的旗帜。他只是站在那里，目光冷峻而坚定，身后是一群同样沉默的追随者。在这个群魔乱舞的时代，隐形者往往比任何张扬的势力都更加危险。"
 DYD_invisible_tooltip: "§a我们不属于任何国家...§!"
 DYD_old_soldiers_never_die: "老兵不死"
 DYD_old_soldiers_never_die_desc: "他们是幸存者、漏网之鱼、流亡岁月中始终没有放下枪的老兵。岁月在他们脸上刻下了深深的沟壑，但握枪的手依然稳如磐石。老兵永远不会死去，他们只是在等待再次被召唤。"
 DYD_soldiers_without_borders: "无国界之军"
 DYD_soldiers_without_borders_desc: "我们不为任何国旗而战，不为任何党派效命，不受任何意识形态的束缚——我们只为同一个信念而战：让这片土地上的人民不再被践踏。他们没有后方、没有补给线、没有退路——但正因如此，他们比任何人都更加自由，也更加危险。"
 DYD_diamond_dogs: "钻石犬"
 DYD_diamond_dogs_desc: "被世界抛弃的人，终将建立自己的世界。他们中有被军阀出卖的旧军官、有被逼上绝路的革命者、有在列强的炮火中失去一切的流民。这些人已经一无所有，因此也无所畏惧。钻石犬不需要同情，不需要理解——他们只需要一个目标，和足够的武器弹药。"
 DYD_expand_propaganda: "扩大宣传"
 DYD_expand_propaganda_desc: "军阀们如何瓜分了你们的土地，买办们如何榨干了你们的血汗，列强们如何把中国变成了他们的猎场。民心如水，我们要做的，只是让水流向它本该去的方向。"
 DYD_a_purist_goal: "纯粹的目标"
 DYD_a_purist_goal_desc: "我们的目标只有一个：建立一个真正属于人民的国家。为此，一切阻碍都必须被扫除，一切敌人都必须被消灭。"
 DYD_deng_and_his_men: "邓演达和他的战友们"
 DYD_deng_and_his_men_desc: "邓演达不是一个人在战斗。在他身边，聚集着一群同样不屈的灵魂——“左轮”郭沫若、“卡兹”季方...他们曾经是北伐的战友，是流亡的同伴，是革命的同志。现在，他们又一次肩并肩站在了同一条战线上。没有誓言，没有宣言，只有生死与共的默契。"
 DYD_sons_of_liberty: "自由之子"
 DYD_sons_of_liberty_desc: "最后的准备已经就绪。弹药箱被撬开，步枪被分发到每一个战士手中，炮兵阵地在黎明前的黑暗中悄然就位，而自由之子默默跟上。"
 DYD_the_man_who_sold_the_world: "出卖世界的人"
 DYD_the_man_who_sold_the_world_desc: "硝烟散尽，华东归于沉寂。但这场胜利的代价是什么？无数战友的亡魂、遍地的焦土、以及一个面目全非的自己。有人说邓演达是英雄，有人说他是独裁者，有人说他出卖了自己曾经信仰的一切。也许他们都是对的。但此刻，站在这片被鲜血浸透的土地上，邓演达只知道一件事：这个世界已经被彻底改变了。"

 NKRDYD.1.t: "幽灵归来"
 NKRDYD.1.d: "孔孟道的崩塌在华东撕开了一道权力的真空，而从这片真空的最深处，走出了一个所有人都以为早已死去的人。邓演达——如同一个执拗的幽灵，选择在最不可能的时刻重返人间。他的出现没有任何预兆：没有先遣队、没有宣传攻势、没有与任何势力的事先勾连。他只是突然出现在了南昌，身边跟着几十个沉默寡言的老兵。消息传开时，各方势力无不为之震动——因为所有人都知道，邓演达从来不打无准备之仗。他的沉默，比任何宣言都更加令人不安。"
 NKRDYD.1.a: "...我回来了。"
 NKRDYD.2.t: "老兵不死"
 NKRDYD.2.d: "一个又一个苍老而坚韧的身影从四面八方汇聚而来。邓演达看着这些曾与自己并肩杀敌的老弟兄，看着他们鬓角的白发和手上的老茧，一时竟说不出话来。倒是郭沫若先开了口：诸位，我们都老了，但老兵不死——我们只是在等一个重新拿起枪的理由。而现在，理由来了。"
 NKRDYD.2.a: "老兵永不消逝。"
 NKRDYD.3.t: "无国界之军"
 NKRDYD.3.d: "邓演达站在新组建的部队面前，表情冷峻。这些士兵没有统一的军装——有人穿着工人的蓝布褂子，有人套着农民的粗麻衣，有人甚至还穿着别的军阀部队的旧军服。但他们的眼神出奇地一致：沉默、坚定，带着一种历经沧桑之后才有的平静。从今天起，我们不属于任何国家，不效忠任何政党。我们是无国界之军——为那些无法为自己而战的人而战。不需要人理解我们，不需要人歌颂我们。我们是被世界遗弃的人，但我们选择为这个遗弃了我们的世界而战。"
 NKRDYD.3.a: "我们没有国家。"
 NKRDYD.4.t: "钻石犬"
 NKRDYD.4.d: "钻石，是在最极端的压力下锻造出来的；犬，是最忠诚也最危险的生物。钻石犬的成员们没有显赫的出身，没有光鲜的履历。他们是被清党逼上绝路的革命者、被军阀出卖的旧军官、在列强的炮火中失去一切的孤儿。这些人已经一无所有，因此也无所畏惧。"
 NKRDYD.4.a: "我们是钻石犬。"
 NKRDYD.5.t: "人心向背"
 NKRDYD.5.d: "如今的邓演达不是一个喜欢宣传的人——他更习惯用行动说话。但战争需要民心，而民心需要引导。不需要煽动，真相本身就是最锋利的武器。民心，已经在我们这边了。"
 NKRDYD.5.a: "让真相说话。"
 NKRDYD.6.t: "纯粹"
 NKRDYD.6.d: "在这个遍地投机者的时代，我们必须保持绝对的纯粹。我们不是为了权力而战——权力会腐蚀一切；我们不是为了财富而战——财富会瓦解一切；我们甚至不是为了某个主义而战——主义会被篡改、被歪曲、被利用。我们为之而战的，是最朴素也最不可妥协的东西：让这片土地上的人能够有尊严地活着。谁挡在这条路上，无论他打着什么旗号、喊着什么口号——消灭他。"
 NKRDYD.6.a: "绝无妥协。"
 NKRDYD.7.t: "邓演达和他的战友们"
 NKRDYD.7.d: "在一间简陋的指挥部里，邓演达环顾四周——这些就是他最信任的人了。有跟他从北伐一路杀到八省混战的老战友，有在流亡日本时结识的革命知识分子，有从各个破碎组织中脱身而来的理想主义者。他们中有人失去了手臂，有人瞎了一只眼，有人的家人早已被军阀灭门。但此刻，他们坐在同一张桌子旁边，脸上没有悲伤、没有愤怒——只有一种超越了个人恩怨的、近乎冷酷的平静。"
 NKRDYD.7.a: "我们就是旗帜。"
 NKRDYD.8.t: "自由之子"
 NKRDYD.8.d: "自由不是别人施舍的，是自己打出来的。今天之后，要么我们为这片土地上所有被欺压的人赢得自由，要么我们就倒在这条路上。没有第三种选择。然后他转过身，第一个走向了前线。身后，自由之子沉默地跟上，靴声整齐如一。大地在脚下颤抖——不是因为恐惧，而是因为决心。"
 NKRDYD.8.a: "向前。"
 NKRDYD.9.t: "出卖世界的人"
 NKRDYD.9.d: "枪声终于停了。邓演达独自站在南京城头，背后是燃烧的天际线，脚下是遍布弹坑的大地。他赢了——那些不可一世的军阀、疯狂的三K党、狂热的褐衫队、盘根错节的旧皖系，一个不剩地被碾碎在了无国界之军的铁蹄之下。但胜利的滋味并不像想象中那样甘甜。太多战友永远地留在了战场上，太多村庄在炮火中化为灰烬，太多曾经坚定的信念在血腥的现实面前产生了裂痕。有人说邓演达为了胜利出卖了自己的灵魂，有人说他背叛了当初不为权力而战的誓言——毕竟，他现在就站在权力的最顶端。邓演达没有反驳。他只是望着远方被硝烟染红的天空，喃喃自语：也许他们是对的。也许我就是那个出卖了世界的人。但这个被出卖的世界...至少，还有重建的可能。"
 NKRDYD.9.a: "推进我们的事业..."