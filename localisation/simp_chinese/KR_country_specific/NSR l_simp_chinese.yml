 KMD_BREAK_NSR: "社革党国策树"
 NSR_social_revolution: "社会革命"
 NSR_social_revolution_desc: "旧世界的一切都已腐朽透顶——军阀、买办、封建遗老、帝国主义的走狗——他们共同编织了一张吸吮民脂民膏的巨网。而今，新社会革命党将以最彻底的革命撕碎这张网。"
 NSR_social_revolution_tooltip: "§a社会革命的烈火已经点燃！§!"
 NSR_rally_the_popular: "号召民众"
 NSR_rally_the_popular_desc: "革命的根基在民众之中。工厂里疲惫不堪的工人、田间地头被地租压弯了腰的农民、城市角落里朝不保夕的苦力——他们才是这个国家真正的主人。"
 NSR_call_the_grade_nationale: "召集国民护卫军"
 NSR_call_the_grade_nationale_desc: "革命需要自己的武装力量——不是军阀的私兵，不是帝国主义的雇佣军，而是一支真正属于人民的军队。国民护卫军应运而生：他们来自工厂车间和田间地头，穿上军装之前是工人和农民，拿起步枪之后便是革命最坚定的捍卫者。"
 NSR_reconnect_kmt: "重联国民党"
 NSR_reconnect_kmt_desc: "孙中山先生的遗志尚未完成，国民革命的火种也从未真正熄灭。散落各地的国民党左派同志们——那些真正信仰三民主义、真正为民族解放与社会进步而奋斗的革命者——正在向我们投来期盼的目光。新社会党决定向他们伸出橄榄枝：我们虽然道路不尽相同，但敌人是一样的。联合起来，共同完成国民革命未竟的大业！"
 NSR_leftist_coalition: "左翼联合"
 NSR_leftist_coalition_desc: "革命的敌人是强大的，而我们的力量还远远不够。环顾左右，工团主义者、社会民主主义者、激进社会主义者——虽然他们的理论各有不同，但在推翻旧秩序这一点上，我们完全可以携手并进。新社会党向所有左翼力量发出了联合的号召：搁置分歧，组建最广泛的革命统一战线！"
 NSR_divine_revolution: "神圣革命"
 NSR_divine_revolution_desc: "社会革命已经进入最神圣、最关键的阶段。前方等待着我们的或许是鲜血与牺牲，但历史已经证明：唯有最神圣最符合中国特色的革命，才能换来最彻底的解放。"
 NSR_suns_legacy: "中山遗产"
 NSR_suns_legacy_desc: "我们要将三民主义中最具革命性的精髓——民生主义——发扬光大，用新社会主义的理论加以充实与升华。中山先生未竟的革命，将由我们来完成。"
 NSR_hurry_for_the_goal: "为目标而疾行"
 NSR_hurry_for_the_goal_desc: "时间不等人，革命更不等人。当敌人还在勾心斗角、互相倾轧之时，我们必须以最快的速度武装起来、行动起来。每一天的犹豫都意味着更多同志的牺牲，每一刻的迟疑都可能让反动派喘过气来。"
 NSR_neo_socialist_incorrupitible: "不可腐蚀的新社会主义者"
 NSR_neo_socialist_incorrupitible_desc: "华东的硝烟终于散尽，新社会党的旗帜在废墟上高高飘扬。我们赢了——一个崭新的政权正在诞生，它将以新社会主义为指导，建设一个没有剥削、没有压迫、人人平等的理想社会。"

 NKRNSR.1.t: "社会革命"
 NKRNSR.1.d: "孔孟道的崩塌不仅仅是一个政权的覆灭，更是旧秩序彻底破产的宣言。当各路军阀与野心家还在废墟中争抢残羹冷炙之时，一面鲜红的旗帜已在街头高高举起。新社会革命党以迅雷不及掩耳之势走上了历史的前台。他们的纲领简单而激烈：打倒一切旧势力，建设全新的社会。工人罢工、学生游行、市民集会——整个福建都在新社会党的鼓动下沸腾起来。一场真正的社会革命已经在这片古老的土地上拉开了序幕。"
 NKRNSR.1.a: "革命万岁！"
 NKRNSR.2.t: "人民的将领"
 NKRNSR.2.d: "革命军队需要革命的将领。新社会党从来不信任那些吃着军饷、喝着兵血的旧式军官——我们要的是从人民中来、到人民中去的指挥员。陈健夫同志出身贫寒，却在多年的地下斗争中积累了丰富的军事经验。有这样的将领，革命何愁不胜？"
 NKRNSR.2.a: "人民的将领，人民的军队。"
 NKRNSR.3.t: "国民护卫军"
 NKRNSR.3.d: "征兵动员令一经发出，应征者便如潮水般涌来。他们不是为了军饷，不是为了升官——他们是为了一个承诺，一个大道之行的新世界。纺织厂的女工放下了纱锭，码头的苦力卸下了扁担，私塾的教员合上了书本——他们走进兵营，穿上了灰布军装，成为了国民护卫军的一员。这不是一支为某个军阀效命的私兵，这是人民自己的武装——为人民而生，为人民而战。"
 NKRNSR.3.a: "人民的军队！"
 NKRNSR.4.t: "国民党的回应"
 NKRNSR.4.d: "我们向散落各地的国民党左派同志发出了联合的呼吁，回应比预想中更加热烈。那些在第一次华东混战之后流亡海外的老同志、那些在各省地下坚持斗争的革命者、甚至一些对右派路线心怀不满的党内中间派，纷纷表示愿意与新社会革命党携手合作。他们带来的不仅是政治上的支持，还有宝贵的行政经验与广泛的社会关系网络。"
 NKRNSR.4.a: "联合一切可以联合的力量！"
 NKRNSR.5.t: "统一战线"
 NKRNSR.5.d: "新社会革命党、国民党左派、工团主义者、社会民主主义者——这些平日里争论不休的派别，今天终于坐在了同一张桌子旁边。会议的气氛起初剑拔弩张，但当各方都意识到分裂意味着灭亡时，各方签署了联合宣言，组建了最广泛的左翼统一战线。分歧并未消失，但此刻，所有人都明白一个道理：先赢了再说。"
 NKRNSR.5.a: "团结就是力量！"
 NKRNSR.6.t: "神圣的事业"
 NKRNSR.6.d: "新社会革命党中央委员会发表了一份措辞激昂的宣言，题为《告全国工农兄弟书》。宣言宣称：我们所从事的，是人类历史上最神圣的事业——消灭一切形式的剥削与压迫，建立一个真正人人平等的社会。宣言的结尾引用了一句古语加以改造：天下大势，浩浩汤汤，顺革命者昌，逆革命者亡！据说这份宣言在各地工厂和农村传抄了数万份，许多不识字的工人请人反复朗读，听到最后往往已是热泪盈眶。"
 NKRNSR.6.a: "为了神圣的事业！"
 NKRNSR.7.t: "继承中山"
 NKRNSR.7.d: "在一场面向全体党员的理论学习大会上，新社会革命党的首席理论家发表了长达三个小时的演讲，题目是《从三民主义到新社会主义》。他详细论证了孙中山先生晚年思想的激进转向——并指出，这些政策的逻辑终点，恰恰就是新社会主义。中山先生的民生主义，本质上就是中国式的社会主义；而我们新社会党要做的，不过是将这条被中断的道路重新走下去，走到底。演讲结束时，全场起立鼓掌长达十分钟。"
 NKRNSR.7.a: "中山先生的遗志，由我们来完成。"
 NKRNSR.8.t: "向目标疾行"
 NKRNSR.8.d: "战争的节奏骤然加快。新社会革命党中央下达了总动员令：一切为了前线！一切为了胜利！工厂转入战时生产，昼夜不停地制造枪支弹药；农村的粮食被统一征调，确保前线将士不饿肚子；学校停课，青年学生们编入后勤运输队，日夜兼程地将物资送往前线。整个革命根据地都变成了一架高速运转的战争机器。"
 NKRNSR.8.a: "全速前进！"
 NKRNSR.9.t: "不可腐蚀"
 NKRNSR.9.d: "枪声停息了，华东大地在经历了漫长的战火之后终于迎来了沉寂。新社会革命党的旗帜飘扬在每一座被解放的城市上空。这场胜利来之不易：无数工人与农民献出了自己的生命，无数家庭永远地失去了亲人。但他们的牺牲不会白费。新社会党向全国庄严宣告：我们建立的，将是一个不可被腐蚀的政权——不被金钱腐蚀，不被权力腐蚀，不被任何旧势力的糖衣炮弹所腐蚀。那些军阀与买办的时代一去不返了。从今天起，这片土地上的每一粒粮食、每一座工厂、每一寸阳光，都属于人民。"
 NKRNSR.9.a: "推进我们的事业..."








