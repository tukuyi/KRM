 SZC_KMD_NSR_united: "中华社会共和国"
 SZC_KMD_NSR_united_ADJ: "中华社会共和国"
 SZC_KMD_NSR_united_DEF: "中华社会共和国"

 SZC_KMD_NSR_party: "新社会革命党"
 SZC_KMD_NSR_party_long: "中国新社会革命党\n§L陈健夫的新社会革命运动看起来已经成功抓住了国民党与工团党都被肃清后的空档期。它尖锐地抨击现存政党要么沦为官僚势力的尾巴，要么陷入暴力主义的泥潭，主张在旧制度的废墟上建立起新社会主义的理想国。\n\n在精神上，它试图提取东方文明的伦理精髓以消弭物欲的横流；在物质上，则主张通过经济社会化来达成生产与消费的理性平衡。他们既拒绝大资本对民生的垄断，也排斥阶级斗争带来的血腥动荡，转而追求一种包括平均地权与节制资本在内的、带有浓厚社会主义色彩的均富社会。对于新革命者而言，真正的民主应当是全民在摆脱了贫困与愚昧后的共同觉醒。\n\n尽管这种试图以“和平、民主、互助”来终结“剥削、暴乱、官僚”的宏大叙事似乎看起来不过是宣传口号，但它确实捕捉到了那些对乱世深感绝望的知识分子与中产阶层的核心焦虑。§!"

 NSR_suns_legacy_for_neosocialist_idea: "新社会主义——孙的遗产"
