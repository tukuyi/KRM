 SZC_zhao_yusong: "赵毓松"
 SZC_zhao_yusong_desc: "§Y生于：§!§L1897年12月26日；大清帝国、贵州省黎平府§!\n§Y背景：§!§L赵毓松，变名邵松。少年时期曾前去为贵州袁祖铭部效力，长期作为其私人代表四处活动。在认识到政党政治之力后，赵毓松于1926年11月10日加入中国青年党，并且以袁名义游说孙传芳夹击北伐军。然而，袁祖铭被唐生智部下诱杀，赵毓松只得逃亡。\n\n在此之后，赵毓松先后效力于安国军政府与归来的直系北京政府，并且聚集起了一小部分更加专注于权势与金钱的小圈子把持青年党旧派系南迁后的华北党务。而在青年党彻底拿下四川后，赵毓松迅速归来，凭借与曾琦的私人关系成为了行社的重要成员以及曾琦本人的重要传声筒。\n\n赵毓松坚持反赤，同时他不小的野心也让人们揣测他绝不愿意甘居曾琦麾下。§!"
