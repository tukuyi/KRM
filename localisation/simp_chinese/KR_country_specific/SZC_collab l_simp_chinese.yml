fengtian_beijing_conference_events.005.c: "哎呀，拖一拖就好嘛，老子他妈的拖了十几年，还拖不得这几天？"
NKRFengtianManchuria.1.t: "东京的照会"
NKRFengtianManchuria.1.d: "日本外务省已等不及了。一份措辞较前次更为强硬的外交照会经由驻华公使馆递至奉天政府，要求我们在规定期限内就加盟共荣圈、开放新驻军点及满铁扩线事宜给出明确答复。\n\n照会本身尚在外交礼节的边界之内，但其附带的期限要求已释放出清晰的信号——东京方面正失去耐心。我方驻日渠道传回的消息显示，日本内阁与陆军省之间在对华政策上的协调已出现明显摩擦，看起来部分强硬派正在寻求绕过外交程序的途径。"
NKRFengtianManchuria.1.a: "发出一份措辞得体却不作任何实质承诺的回函。"
NKRFengtianManchuria.2.t: "满铁的动作"
NKRFengtianManchuria.2.d: "在外交照会之后，满铁方面率先采取了行动。奉天境内数条原本已谈妥合作条款的铁路项目被单方面叫停，满铁驻奉天事务所的数名负责人已悄然离境回国，同时满铁在若干城市的仓储设施开始出现物资集中转运的迹象。\n\n这些举措很难说是出于商业考量。满铁的经济影响遍及整个东北，其背后的政治意图已不言自明。奉天政府内部对于满铁这一系列动作的解读不一，分歧本身同样是个问题。"
NKRFengtianManchuria.2.a: "继续维持现状，将满铁的动作定性为正常的商业调整。"
NKRFengtianManchuria.3.t: "关东军反应"
NKRFengtianManchuria.3.d: "来自旅顺的情报表明，关东军内部的强硬派已无法接受东京主导的外交方针。他们认为，对奉天的反复妥协已成为整个满洲政策失效的根源，而东京方面的不作为正在坐视局势滑入不可控的轨道。\n\n如果我们再这么拖下去，恐怕局势就要完全脱离控制了..."
NKRFengtianManchuria.3.a: "他妈了个巴子的，还敢把我炸上天不成？"
NKRFengtianManchuria.4.t: "公使警告"
NKRFengtianManchuria.4.d: "日本驻华公使以非正式渠道向奉天政府发出警示：在东京方面看来，当前奉天的拖延策略已引发关东军内部强硬派的极度不满，而大本营对前者的约束力正在减弱。公使馆的这一举动本身便颇为耐人寻味——这既可以理解为东京的善意提醒，也可以理解为一种迂回施压的方式。\n\n无论公使馆的真实意图如何，这份警告所传递的信息是明确的：留给拖字诀的时间已经不多了。"
NKRFengtianManchuria.4.a: "看起来总得做出反应了..."
NKRFengtianManchuria.5.t: "皇姑屯事变"
NKRFengtianManchuria.5.d: "张大帅的专列在经过皇姑屯铁路桥时，遭遇事先布置的炸药袭击。张作霖于当日午后在大帅府不治身亡。\n\n关东军随即以维持地方秩序为由向沈阳增兵，东京大本营尚未对此作出公开表态。奉天政府内部的消息封锁正在努力维持，但局面已难以为继——拖字诀拖到最后，拖来的是这个结果。"
NKRFengtianManchuria.5.a: "稳住局面！"
NKRFengtianManchuria.6.t: "统一大会流产"
NKRFengtianManchuria.6.d: "原定由张作霖主持、召集各省代表重建中央政府的统一大会，已宣告无限期搁置。\n\n大部分代表已低调离去，他们带走了对北方的最后一丝期望。部分代表在返程途中已开始与其他政治势力接触——广州方面、武汉方面，乃至部分独立的省级势力，都在这一时机伸出了接洽之手。奉天作为全国政治中心的设想，至此已彻底成为泡影，而未来中国的权力格局将在一片混沌中重新寻找其重心。"
NKRFengtianManchuria.6.a: "眼下只能先图自保。"
NKRFengtianManchuria.7.t: "关东军越权行动"
NKRFengtianManchuria.7.d: "等待已超出了关东军强硬派所能忍忍的极限。\n\n以保护南满铁路沿线日本侨民为由，关东军各部已开始向奉天境内的若干战略据点发动攻击，行动规模远超任何一次此前被定性为治安维持的单边部署。东京大本营的训令尚在电报线上，而前线的炮声已经响起。\n\n拖字诀最终没有拖过关东军的耐心。"
NKRFengtianManchuria.7.a: "立即召集军政要员，商讨应对方案。"
NKRFengtianManchuria.8.t: "不扩大方针"
NKRFengtianManchuria.8.d: "皇姑屯事变的消息抵达东京后，日本内阁迅速确认关东军此举属于未经授权的独断行动，并宣布采取不扩大方针——公开表示遗憾，以外交途径安抚诸国，同时拒绝对相关责任人展开实质追究。\n\n这一结果对奉天而言意味着三点：东京方面管不住自己的军队已成公开事实；关东军此次独走实际上未受任何惩处，这无疑将成为日后类似行动的先例；而列强在震惊之余的沉默，也进一步明确了奉天在此局中只能依靠自己的现实。"
NKRFengtianManchuria.8.a: "这群鬼子总是这样..."
NKRFengtianManchuria.9.t: "天津军的震惊"
NKRFengtianManchuria.9.d: "关东军的越权行动同样令驻扎天津的日本军方深感措手不及。天津军方面与关东军之间的协调并不充分，这场突如其来的行动将他们置于一个尴尬的位置——关东军已经造成了事实，而天津军必须尽快决定自己站在哪里。\n\n然而震惊过后，天津军方面的反应比外界预料的更快。他们迅速意识到，关东军在满洲的既成事实意味着整个华北的政治格局将不可避免地发生重构，而天津军若不尽快介入这场重构，主导权将彻底落入关东军手中。\n\n天津军的电报开始频繁往来于北京的若干官邸之间。"
NKRFengtianManchuria.9.a: "他们又想干嘛？"
NKRFengtianManchuria.10.t: "北京的合作者"
NKRFengtianManchuria.10.d: "天津军方面的接触对象并不难找。北京城内历来不缺愿意在任何旗帜下谋求一官半职的旧官僚与政客，其中不少人曾与奉天政府维持着若即若离的关系，另一些则是纯粹的机会主义者，其政治立场随局势风向而动。\n\n天津军幕后操盘的核心构想已初步成形：以日本的军事存在为后盾，以北京的旧官僚网络为门门，吸纳北京政府的残余机构充实政权架构，在华北地区建立一个名义上独立、实际上依附于日本的地方政权——所谓维新政府。\n\n这一构想对北京那些旧官僚而言并不陌生。他们见过太多走马灯式更迭的政权，这不过是又一次换旗易帜而已。"
NKRFengtianManchuria.10.a: "..."
NKRFengtianManchuria.11.t: "维新政府的构想"
NKRFengtianManchuria.11.d: "天津军方面已通过中间人向北京政府的部分要员传递了一套相当具体的方案框架。\n\n按照这套方案，北京政府的现有机构将被整合进一个新成立的华北地方政权，政权的正式名称尚未确定，但维新二字已在私下流通。新政权将覆盖华北诸地，对外声称以恢复地方秩序与经济建设为施政重心，实际上则在日本军事存在的框架下运作。\n\n北京政府的现有要员在新政权中将获得一定的职位安排——这是方案中唯一可以称得上诱人的部分。至于东北本土的主权归属，方案中的措辞刻意模糊。"
NKRFengtianManchuria.11.a: "我们大概也没得选了。"
NKRFengtianManchuria.12.t: "中华民国维新政府"
NKRFengtianManchuria.12.d: "华北维新政府在北京正式宣告成立。新政权以直隶与山东为核心辖区，对外则以恢复华北秩序、推进经济建设为施政纲领。\n\n天津军方面的代表出席了成立典礼，但全程以顾问身份列席，并未在台面上显露过多。北京的旧官僚们以一种熟稔的姿态接过了这顶帽子，仿佛不过是换了一块牌匾。\n\n国际社会的反应不温不火。对列强而言，华北又多了一个需要打交道的地方政权，仅此而已。"
NKRFengtianManchuria.12.a: "这顶帽子戴上去容易，摘下来就难了。"

NKRFengtianManchuriaNews.1.t: "皇姑屯事变"
NKRFengtianManchuriaNews.1.d: "随着张作霖继续采取拖延战术，日方青壮军官愈发担忧其在满洲的影响力将彻底丧失——连同数十年来的投资与民族自豪感一并付诸东流。\n\n关东军在满铁控制的铁路附近引爆了少量炸药（距离足够远以确保不会对铁轨造成实质损坏），并宣称这是奉系之敌袭击了表面中立的日本驻屯军。日本驻屯军以此为借口，开始炮击中国军队阵地——这迫使起初不情愿的日本高级军官以及后续的东京方面接受了这一计划。\n\n随着日军部署到位，准备直接介入冲突，日方在张大帅谴责日本帝国主义并倒戈之前将其刺杀。如今，随着奉天政府已经彻底陷入混乱，关东军说不定已经开始准备扩大战果了。"
NKRFengtianManchuriaNews.1.a: "就这样？张作霖死了？"
NKRFengtianManchuriaNews.2.t: "新国家建立"
NKRFengtianManchuriaNews.2.d: "关东军的军事行动很快就取得了成果，如今濒临崩溃的北京政府不得不在天津军协助下同关东军方便斡和，并宣告了中华民国维新政府的成立。\n\n与之相对的，关外的关东军则在扩大军事战果后宣告了他们的疯狂计划：一个新生的、纯粹人为建构的“满洲合众国”。世界诸国对此深感担忧，日本外务省官僚对此惊慌失措，纵使是陆军其他各部也对这般计划感到匪夷所思，遑论议员之众。尽管如此，诸多“大亚洲主义”支持者已经开始为帝国在满洲的军事行动欢呼，但全中国都已经对这种不加掩饰的分裂行径与傀儡政府的建立感到震怒，中日战争显然已是不可避免了。"
NKRFengtianManchuriaNews.2.a: "两个新国家..."
NKRFengtianManchuriaNews.3.t: "华北危机！"
NKRFengtianManchuriaNews.3.d: "#满洲国和维新政府之间出现了小规模军事冲突，不过迅速平息。具体成因都无人知道"
NKRFengtianManchuriaNews.3.a: "他们在搞什么名堂？"
NKRFengtianManchuriaNews.4.t: "第二次收复蒙古"
NKRFengtianManchuriaNews.4.d: "根据最新军情，中华民国维新政府军已正式进驻察哈尔，并开始向蒙古腹地挺进。维新政府公开重申中华民国对蒙古诸地的法理主权，强调其为不可分割之领土，并宣称此次军事行动将是继徐树铮之后，民国第二次、亦是最后一次的收复外蒙之举。\n\n鉴于俄罗斯目前正倾尽全力应对西方强敌、无暇东顾，蒙古如今不仅要独自面对全副日式装备且无后顾之忧的维新军，其背后更面临着整个“大东亚共荣圈”的威压。国际观察家对蒙古的战略前景多持悲观态度，普遍认为此次出兵是维新政府在“亲日泛亚”的政治框架下，借重塑民族主义叙事以巩固其政权合法性的一次果敢博弈。"
NKRFengtianManchuriaNews.4.a: "又是蒙古..."


 



 NKRsichuanCollab.1.t: "危机感"
 NKRsichuanCollab.1.d: "北京已告失守，奉天军之先头部队已入驻正阳门。关外大军如入无人之境，沿途旧军阀望风披靡。现北京城内五色旗重悬，旧日政客及各路失意军阀正纷纷云集，欲倚仗奉军之刺刀于故都重建所谓国会。长城内外，寇氛日蹙，华北全局已濒临万劫不复之绝境。\n\n当这份沾染着前线硝烟与绝望气息的加急电报被重重地拍在成都督署的红木办公桌上时，整个青年党中央执行委员会的空气仿佛瞬间凝固。窗外的锦城依旧繁华喧闹，茶馆里依然回荡着市民们的谈笑，但在这间决定国家主义命运的会议室里，死寂得令人窒息。\n\n长久以来，中国青年党一直以“外抗强权，内除国贼”为全党的最高政治圭臬。我们在四川盆地里厉兵秣马，推行国家主义的社会改造，无非是为了有朝一日能够打出夔门，澄清宇内。然而，现实的引力是冰冷且残酷的。现在盘踞在北方的，已经不再是那个直系与清廷的缝合怪，而是与海洋对岸恐怖的战争机器深度捆绑的庞然大物。理智在每一个高级党务委员的脑海中疯狂敲响警钟：我们这几年在西南腹地依靠勒紧裤腰带积攒下来的那点可怜的国军家底，真的能够跨越秦岭与长江，去正面对抗一个拥有无限工业产能和绝对海空优势的超级军事集团吗？\n\n答案是不言而喻的。一旦强行开战，我们苦心经营的四川模范省必将在日军的无差别轰炸下化为一片焦土，不仅千万川蜀黎民将生灵涂炭，国家主义的最后一点火种也将被彻底掐灭。然而，若是退缩、若是承认北方的既成事实，青年党立党的法理根基又将置于何地？这个进退维谷的绝境，自然也在第一时间将党魁曾琦逼到了悬崖边缘。面对这堵由钢铁、硝烟和帝国主义野心筑成的绝壁，这位以行事果决著称的领袖陷入了长久的、令人不安的沉思。在国家存亡与政党生存的绝对压力下，妥协的毒蛇已经在阴暗的角落里悄然吐出了信子。"
 NKRsichuanCollab.1.tt: "§Y由于你现在的权力平衡与赵毓松的任职，该选项可用！§!\n§L所以你真的要走上这条路吗？这条§o背叛民族，背叛国家，背叛这个党初衷§!的§j道路§!？§!"
 NKRsichuanCollab.1.a: "快让赵毓松去看看！"
 NKRsichuanCollab.1.b: "你他妈疯了？当汉奸？"
 NKRsichuanCollab.2.t: "马基雅维利之举"
 NKRsichuanCollab.2.d: "深更半夜的委员长官邸书房内，没有点亮汽灯，唯有壁炉里偶尔发出的木柴爆裂声，打破着令人窒息的死寂。曾琦独自一人坐在宽大的真皮皮椅中，他的目光并没有聚焦在墙上那幅巨大的中华民国全图上，而是深邃地、近乎空洞地凝视着跳动的火苗。\n\n“为达目的，可以不择手段。君主必须是一头狐狸以便认识陷阱，同时又必须是一头狮子以便使豺狼惊骇。”这句冷酷的箴言此刻正在他的脑海中反复回荡。如果是为了拯救青年党的政治生命，为了在这个被强权无情撕裂的世界里，为“国家主义”保留最后一块试验田，那么，哪怕是与魔鬼进行交易，哪怕是背上千古骂名，这难道不是一个真正的政治家、一个为了国家长远利益计的士大夫所必须承担的沉重十字架吗？\n\n曾琦开始在心中构筑一个极度危险，甚至可以说是在悬崖边上走钢丝的战略。他痛苦地意识到，把所有的政治资本都毫无保留地砸在必败无疑的对日全面抗战上，是匹夫之勇，是极其愚蠢的政治自杀。国家就像一个病重的有机体，现在最需要的是“保存元气”。因此，我们必须有人潜入黑暗，去和日本人、去和东部那些暗流涌动的势力接触，探寻一条在夹缝中苟延残喘的灰色出路。\n\n赵毓松，这个深谙官场腠理、身段足够柔软且对自己绝对忠诚的政治掮客，无疑是执行这项脏活的最佳“白手套”。只要能保住党的建制，只要能把四川的军队留住，暂时的屈辱算得了什么？未来的历史，终将由最终的存活者与胜利者来书写。既然高尚的道德救不了这个积贫积弱的国家，那就让绝对的实用主义来接管一切吧。"
 NKRsichuanCollab.2.a: "那又何妨？"
 NKRsichuanCollab.3.t: "旧信件"
 NKRsichuanCollab.3.d: "床次竹二郎生前曾极力主张“中日提携”、反对军部的激进武力吞并政策。更为机密的是，他甚至曾在暗中尝试提携和资助过当时尚处于起步阶段的中国青年党，试图将这股初生的国家主义力量，培养成对抗苏俄共产主义南下的东方防波堤。虽然床次先生早已于数年前故去，但他在日本外务省、财阀，以及更为关键的——日本华中、华南派遣军中留下的庞大人脉与政治遗产，依然在暗中发挥着不可小觑的作用。\n\n不管对于曾琦还是赵毓松，这叠旧信件，都是他们敲开地狱之门的最完美钥匙。通过连日来在租界各处隐秘会所的周旋，利用这些旧日的政治恩怨与利益纠葛，赵毓松成功地联系上了日本驻上海的特务机关高层。在试探性的接触中，赵毓松巧妙地表明了青年党高层“愿意基于当前的现实地缘考量，重新评估并调整中日关系”的暧昧态度。他暗示，青年党并非冥顽不灵的暴徒，而是一个懂得知所进退、且在中国西南拥有完整行政骨架的现代政党。"
 NKRsichuanCollab.3.a: "日本人..."
 NKRsichuanCollab.4.t: "和平宣传"
 NKRsichuanCollab.4.d: "对于那些政治嗅觉敏锐的观察家来说，近日成都的空气中似乎混入了一种异样的气味。如果细心翻阅近几周的青年党机关报《新中国日报》或《醒狮》周刊，就会发现一个令人毛骨狲然的转变：原本那些占据头版头条的、慷慨激昂的“宁碎玉不全瓦”、“打倒帝国主义”、“血战到底，还我河山”的社论，正在被一种极度隐晦、圆滑且充满政治投机色彩的修辞所悄然取代。\n\n宣传口径的转弯生硬而又诡异。诸如“和平”与“宪政”这两个词汇，开始以前所未有的高频率、远超中社媒体的程度出现在官方的文书与学者的专栏中，并且往往被极其巧妙地与“反共救国”、“警惕内乱”等议题捆绑在一起。社论的作者们开始大谈特谈“东亚局局之复杂，实非一味黩武所能解”、“应以保全民族复兴之元气为第一要务”、“必须警惕赤色暴徒与无政府分子借战乱渔翁得利，颠覆我国之法统”等论调。\n\n这种试图将民众的仇恨从外部的侵略者身上，强行转移到内部的政敌与意识形态对手身上的做法，在知识界和大学校园里引发了相当的困惑与不安。青年学生们在茶馆里交头接耳，愤怒地质问：难道国家主义的底线竟然可以为了所谓的“和平”而无限退让吗？难道我们武装起来的国防军，只是为了防范同胞，而不是去抵抗外侮？"
 NKRsichuanCollab.4.a: "这意味着什么？"
 NKRsichuanCollab.5.t: "军区调防"
 NKRsichuanCollab.5.d: "当笔杆子的论调开始发生令人不安的转向时，枪杆子内部的隐秘清洗也必然如影随形地展开。想要最终落实与日本人在上海达成的秘密媾和，完成路线的彻底跨越，最大的阻力并非来自那些只会在报纸上写文章的知识分子，而是那些手中握有兵权、满脑子“铁血救国”与“民族大义”的激进派军官。\n\n随着一次旨在“提升军队现代化指挥素养”再正常不过的防区换防与人事调动，那些曾在公开场合强烈要求出川抗日、对日态度极度强硬、且在底层士兵中享有极高声望的将领——比如一直被视为少壮派旗帜的苗可秀等人——被明升暗降，粗暴地剥夺了主力作战师团的实际指挥权，转而被调往偏远的大后方担任闲职，或是被强行送进新设立的高级教导团进行所谓的“长期战略研习”。\n\n取而代之接管这些精锐卫戍部队的，大多都是那些在混迹军界、对反赤有着优先信奉而对反日略显颓感的旧派军官。在各关键防区和卫戍司令部指挥官的大面积换血后，青年党的武装力量似乎正在被悄然抽走反日爱国的脊梁骨。"
 NKRsichuanCollab.5.a: "不对劲..."
 NKRsichuanCollab.6.t: "所有的明天"
 NKRsichuanCollab.6.d: "与关东军那种蛮横无理、视中国地方政府如草芥的态度截然不同，日本参谋本部中国课的特务机关长——影佐祯昭，向我们抛来了一根橄榄枝。影佐在电文中直言不讳地指出，内阁与陆军省早已因满洲问题彻底撕裂，关东军不受控制的诸多擅自行动也让大本营颜面尽失。为了在未来的中国版图中制衡关东军的势力，上海派遣军亟需一个在关内有组织、有理论、有群众基础的中国现代政党来充当他们的政治盟友。影佐承诺，只要中国青年党愿意放弃“狭隘的抗日排外思想”，加入大东亚共荣的框架，日方不仅将保证我们西南根据地的绝对安全，更支持我们在南京建立一个“全国性”的中央政府，以此来对抗北京那群听命于天津军的北洋老军阀。\n\n这简直是一份魔鬼开出的顶级账单——一种绝望的羞辱，又是一份令人战栗的诱惑。与虎谋皮的下场会如何？一旦走上这条路，青年党“内除国贼、外抗强权”的清誉就将立刻化为粉齑。然而，如果不签下这份协议，日本人的铁蹄必然在不久后踏平四川。无数的明天就在眼前铺开，一条是血与火的玉石俱焚，一条是满载着帝国主义施舍的虚假繁荣。在这死一般的寂静中，曾经在巴黎街头与左翼留学生大打出手的爱国青年领袖第一次在他的政治生涯中感到了恐惧。这种恐惧并非源于生死，而是源于他意识到自己正在亲手将“全民革命”的理想打包装进日本人的行囊。"
 NKRsichuanCollab.6.a: "这真的可信吗？"
 NKRsichuanCollab.7.t: "赵毓松回电-1"
 NKRsichuanCollab.7.d: "作为曾琦在政治投机上的白手套，赵毓松有着旧式官僚特有的敏锐与圆滑。他在电报回文中向成都直言不讳地陈述了自己的观察：日本人内部的裂痕，远比我们想象的要深得多。关东军与上海派遣军的矛盾早已激化，双方为了争夺未来中国大陆的控制权乃至对日本本岛政治影响力正在进行一场没有硝烟但刀刀见血的暗战。上海派遣军对天津军在北京扶持的那些家伙相当厌恶，遑论关东军这些毫不掩饰意图的了。\n\n在影佐祯昭的眼中，青年党这群有留洋背景、有法治理念、有严密党务雏形的知识分子，简直是用来装点“新秩序”的最佳玩偶。电文的字里行间，赵毓松隐晦地提出了一个大胆的谋划：既然日本人迫切需要我们来制衡北方，那我们为何不能反客为主？表面上我们接受日本人的扶持，顺应时势，在日占区建立起稳固的行政班子，暗地里则利用日本人急于求成、互为内耗的心理，争取更多的统筹权与财政留成！等日后我们借着皇军的枪炮坐稳了金陵，借着这套被扶持起来的合法外壳收拢了民心与地盘，等到那时......谁利用谁，还未可知！"
 NKRsichuanCollab.7.a: "转过来利用他们？"
 NKRsichuanCollab.8.t: "赵毓松回电-2"
 NKRsichuanCollab.8.d: "电报的内容让所有在场者都感到一种诡异的荒诞。影佐祯昭展现出的“诚意”已经超越了常规外交的认知——日方不仅口头上高度认可了青年党长期以来追求的“宪政民主”诉求，甚至在电文中承诺，一旦新政权在南京确立，帝国陆军将全力配合国民大会的召开，在“大亚洲共荣”的框架下，重塑一个自由且对等协作的中华民国。\n\n这番说辞简直是荒天下之大谬。谁都清楚，刺刀之下，帝国主义的所谓“提携”，不过是披着共荣外衣的永久殖民枷锁。但在长久以来的绝望与焦虑之下，这套充满了自我催眠意味的逻辑正迅速成为高层内特定圈子的精神慰藉。他们反复向彼此，也向党内基层的爱国青年们暗示：如果不接受日本人的条件，我们的报纸要被封，我们的学校要被炸，我们的党务要彻底瘫痪，与其让国家在无谓的玉石俱焚中走向毁灭，不如忍辱负重。哪怕饮鸩止渴，只要能保住这套民主宪政的政治外壳，只要能维持住基本的民生，未来总有一天，我们能让这些侵略者尝到苦果。\n\n“哎，和日本人做交易，便是这样啊。”他们正在亲手编织一张弥天大谎，并且企图让全党和全中国，都相信这是通往光明的唯一正道。"
 NKRsichuanCollab.8.a: "继续谈判。"
 NKRsichuanCollab.9.t: "牵线搭桥"
 NKRsichuanCollab.9.d: "今日迎来了一批特殊的访客。国家社会党部分骨干组成的代表团——这群人因其领袖张君劢的独裁风格与抗日立场而陷入了令人遗憾的内部分裂。以诸翔等人为首，部分激进的国社党人组建了“政务特别委员会”，公然与党中央决裂，寻求与日方达成妥协性安排。\n\n如今，这批脱离了正统的“国社党政特委”成员，正带着日本人牵线搭桥的密令登门拜访——那种跨越了党派阻碍的熟稔感令人不寒而栗。他们不仅在意识形态上与青年党原有的法治宪政框架天然亲近，更在对日合作问题上达成了心照不宣的政治共识。看着这群曾经的学术同路人如今卸下了救亡的包袱，凭借着金融与新闻界的人脉建立起亲日中央，曾琦的心头浮现出一股无法言说的复杂滋味。\n\n曾经引领中国近代宪政启蒙、以梁启超先生为精神导师的先锋智库，如今却以这样一种诡异的形式重新走到了一起，共谋一场打着“和平救国”旗号的政治投机。日本人显然更信赖拥有西南兵权与政权的中国青年党，但绝不会坐视我们独大。面对这群主动送上门来的政治盟友，一种同病相怜的腐臭感在会议室里弥漫开来。合流吧，这便是你们的新同路人。"
 NKRsichuanCollab.9.a: "梁任公的遗产以一种诡异的形式重归同路..."
 NKRsichuanCollab.10.t: "收拾行李"
 NKRsichuanCollab.10.d: "成都的晚风带着凉意，吹动着督署窗外稀疏的梧桐叶。曾琦默默地站在红木衣柜前，亲手将几件裁剪得体的西装叠放进那口陈旧的牛皮藤箱中。这是他当年从法兰西游学归来时带回的箱子，上面还斑驳地残留着当年在巴黎街头彻夜演讲、憧憬少年中国重生的浪漫气息，只是如今，它将要装载的是一次走向万劫不复的政治旅程。\n\n赵毓松在上海的探查虽然取得了突破性进展，但事态的复杂性远超出了电报所能传递的极限。日本人内部的角力正处于白热化，派遣军的特务机关长影佐祯昭已明确告知，若要最终敲定那个足以保证青年党未来执政地位的“和平建国宣言”确认日方背书的政治合法性，仅靠一个私人代表是远远不够的。对方要求必须由青年党的最高领袖亲自出面，与日军驻华最高层进行一场确定实质性盟约的秘密会晤。\n\n他走到书桌前，拿起那本早已翻得起了毛边的《君主论》，目光在“为达目的，不计手段”那一行字上反复摩挲。他正在政治逻辑的深渊里给自己编织一个足以安眠的理由。"
 NKRsichuanCollab.10.a: "别人会怎么看我呢？"
 NKRsichuanCollab.11.t: "自作聪明？"
 NKRsichuanCollab.11.d: "在做出前往上海的决定之后，曾琦的神经便一直处于一种极度紧绷且带有自我毁灭色彩的亢奋之中。这位自诩为当代马基雅维利的政治家正试图用他那套引以为傲的权术去戏耍一个庞大的战争机器。他反复向党内核心圈的少数亲信论证：日本人需要我们来治理南方，我们则利用日本人的内耗来完成中国的实质性统一，待到羽翼丰满，再将侵略者一脚踢开。这看似是一场绝妙的借力打力，是一场政治上的“空城计”，但他内心深处最柔软也最恐惧的地方，却时刻在向他发出无声的警告。\n\n这种看似高明的权谋，真的能够驾驭得住那些用刺刀说话的日本军部疯子吗？当整个国家都处于随时可能因为一点摩擦而化为焦土的火药桶上时，他的“曲线救国”究竟是真正高瞻远瞩的政治智慧，还是自我陶醉的荒诞豪赌？每当他在深夜翻阅电报，看着各地党部发来的、关于华北局势日渐糜烂的汇报时，一种难以言喻的窒息感便会紧紧攥住他的咽喉。\n\n不，他绝不承认这是软弱。他一遍又一遍地在书房里来回踱步，嘴里喃喃着为了国家大计必须忍辱负重。若是那些满腔热血的同僚们、那些高喊着抗日口号的书生们，不能理解这番苦心，那就让他们去痛恨自己好了。只要能为中国保留下一丝元气，哪怕背负万世骂名，哪怕千夫所指，他曾琦也绝不会退缩半步。"
 NKRsichuanCollab.11.a: "绝不如此。"
 NKRsichuanCollab.12.t: "关外危机！"
 NKRsichuanCollab.12.d: "一份加急的血红色战报如同晴天霹雳将成都督署内诸人等人残存的幻想彻底击得粉碎：大帅张作霖被炸死了！\n\n昨日午后，从北京传回了惊人噩耗。张作霖的专列在途径皇姑屯铁路桥时，遭遇了事先埋设的大量黄色炸药的毁灭性袭击。整节车厢瞬间化为漫天飞舞的钢铁残骸，这位曾雄踞东北、左右中国北方政局数十载的乱世枭雄，就这样在毫无防备中迎来了生命的终局。事件发生后，关东军迅速以“维持地方秩序，剿灭赤化分子”为由，向沈阳及周边地区大举增兵，而东京大本营却在此时集体陷入了诡异的沉默。\n\n当这一惊人消息传到成都时，整个党务系统皆陷入了前所未有的死寂与极度的恐慌。没有人是傻子，所有人都心知肚明——这绝非什么所谓的“意外”或“赤党暗杀”，这是关东军的少壮派一手导演的，赤裸裸的恐怖袭击！张作霖与日本人合作了十几年，甚至不惜出卖了东北的无数利权来换取日本人的支持，可当他试图在涉及中国主权与自身军阀利益的关键节点上，表现出哪怕一丝一毫的抗拒与独立时，这群嗜血的日本军国主义疯子就毫不犹豫地用几百公斤炸药将昔日的盟友送上了天。\n\n那些在上海租界和派遣军特务机关之间达成的“亲善、提携、合作”的口头承诺此刻看起来是多么的滑稽和可笑。今日日本人可以炸死听话了十几年的张作霖，明日当青年党真正在日本人的刺刀下组建了政府，试图在他们制定的新秩序下争取一点点可怜的行政自主权时，等待着他们的又会是什么样的下场？"
 NKRsichuanCollab.12.a: "现在是张作霖，接下来是谁？"
 NKRsichuanCollab.13.t: "北京急电"
 NKRsichuanCollab.13.d: "一份来自华北党部地下情报网的急电以一种令人胆寒的姿态送到了曾琦的案头。\n\n电文详述了北京当下的惨淡现状：在那位大帅身亡的震慑下，原本维持着脆弱法统的北京政府彻底陷入了失序状态。那些平日里在高谈阔论“共和”的北洋系官僚、国会议员及地方政客在目睹了关东军那肆无忌惮的暗杀手腕后，展现出了令人作呕的政治怯懦。他们争先恐后地拖家带口涌入了天津日租界。在那里，这群昔日的所谓民国栋梁正卑躬屈膝地向关东军的特务头子们递交投名状，以此换取在日本刺刀保护下成立所谓“维新政府”以代行主权的一官半职。\n\n更令曾琦感到刺骨寒意的是，华北党部的同志在电文中痛心疾首地指出维新政府的架构搭建速度惊人，天津军正将这批毫无气节的旧官僚收纳为新的统治工具。这传递出了一个最直观也最致命的信号——如果再不行动，日本人就不需要我们这个远在西南、且在意识形态上还带着一点“全民革命”色彩的知识分子党派来充当他们在关内的装点门面了！在旧官僚和投机客蜂拥向侵略者摇尾乞怜的卖国竞赛中，青年党如果再不做出最终的政治决断，恐怕连当汉奸、当傀儡的资格都要被别人抢得干干净净。"
 NKRsichuanCollab.13.a: "看来世人都是如此..."
 NKRsichuanCollab.14.t: "箭在弦上"
 NKRsichuanCollab.14.d: "赵毓松正死死盯着一份由日本华中派遣军影佐机关长刚刚派人送达的最后通牒。字里行间没有任何外交辞令的修饰，只有日本军部那赤裸裸的、傲慢至极的指令：派遣军不能在关东军的势头下继续等待。他们要求青年党必须在规定期限内公开发表通电，宣布彻底同抗战立场划清界限。\n\n伴随这份通牒而来的，是日方在长江水面上日渐频繁的演习，以及对重庆与成都防区边缘的侦查飞行。这些军事动作虽然尚未构成全面进攻，但其中的威胁信号清晰无比：日本军方已经失去耐心，他们要求青年党立刻将此前私下会谈的“暧昧口径”转化为公开的投降政纲。赵毓松在回电中战战兢兢地向成都汇报，称派遣军高层正在受到来自国内强硬派的倒逼，若不能在这场无声的阵营站队中取得头筹，我们西南根据地将立刻面临来自日军重炮与封锁的毁灭性打击。\n\n当初那个利用日本内耗“借力打力”的空城计此刻已变成了一场彻头彻尾的作茧自缚。日本人不仅知晓了一切，更是在以一种猫戏老鼠的姿态强迫这群书生革命家一点一点地吞下名为叛国的剧毒。退，则是粉身碎骨；进，则是万劫不复。历史的进程已经不再给予他们任何腾挪的空间，所有的犹豫都已被枪炮声逼入了死角。"
 NKRsichuanCollab.14.a: "不得不发。"
 NKRsichuanCollab.15.t: "和平宣言"
 NKRsichuanCollab.15.d: "伴随着黄浦江畔的绵绵细雨，各大主流报刊在日军特务机关的默许与“护卫”下在头版头条刊登了一份惊天文件——《和平建国宣言》。\n\n这份由赵毓松亲笔撰写、并挂上中国青年党名义发布的通电写道：“中日两国无论从何方面着想，均宜携手协力进行，共谋两国前途的发展”，宣称：“中日两国当为亚洲民族独立运动的原动力，对抗西方工团帝国主义之渗透。”\n\n在这些华丽、空洞的文字掩护下，赵毓松将日本的行径称为“为了东亚共荣而进行的必要指导”。曾经在“少年中国学会”时期那个令无数爱国青年热血沸腾、立志要在世界民族之林争得堂堂正正地位的国家主义之梦，就此被卖给了日本人的刺刀与军靴。\n\n一个曾经代表着中国政治革新希望的现代政党，此刻正以一种前所未有的姿态向侵略者递上了投降书。"
 NKRsichuanCollab.15.a: "他真的这么干了..."
 NKRsichuanCollab.16.t: "崩坏"
 NKRsichuanCollab.16.d: "整个青年党的政治中枢彻底爆炸了。原本就潜伏在组织肌理之下的派系裂痕，瞬间被这份投降通电震碎为不可挽回的万丈深渊。\n\n李璜在拿到报纸的那一刻双目赤红地指着台下那些面色阴沉的行社高层，声音因极度的愤慨而嘶哑咆哮：“国贼！无耻之尤！这已经不仅仅是政治妥协，这是在公然卖国！这是在挖我们青年党二十年来立党为国的祖坟！曾琦到底想干什么！他到底想把我们带向何方？！”坐在一旁的左舜生更是浑身瘫软地跌回皮椅之中，双手死死地抓着胸口。\n\n会议厅的走廊里，早已挤满了闻讯赶来的基层爱国青年党员。党内，曾经神圣的理想主义信条正成片崩塌，取而代之的是令人窒息的猜忌与仇恨。行社与神社、中社等各派系之间彻底撕破了最后一层脸皮。那些曾经一同在巴黎街头与左翼留学生大打出手的“国家主义者”们此刻却指着彼此的鼻子，互相痛骂着“国贼”。整个成都的党政系统，都在这场道德与信仰的毁灭性海啸中陷入了歇斯底里的崩溃。曾琦试图维持的那套“缓行图存”的政治戏法，最终演变成了一场人人喊打的荒诞悲剧。大厦将倾，一木难支。"
 NKRsichuanCollab.16.a: "于是乎。"
 NKRsichuanCollab.17.t: "狂怒"
 NKRsichuanCollab.17.d: "《和平宣言》所引发的剧烈冲击波并未仅仅局限在成都督署的会议室里，它以一种摧枯拉朽的态势，迅速沿用电报与军线渗透进青年党所掌控的所有军事防区、新军校与基层连队之中。\n\n前线的基层军官和普通士兵们，陷入了极度的迷茫与不可遏制的狂怒之中。兵营里到处是撕扯臂章的争执声，愤怒的士兵开始拒绝执行上级的操课指令，甚至爆发了多起向党部驻军营区投掷石块的恶性事件。\n\n然而，最令人绝望的裂痕，在于基层官僚与军官团的分化。许多人迅速完成了站队，他们利用手中的机枪与宪兵权对那些抗日青年军官实行了严密的监控与软禁。在青年党的大旗之下，爱国热忱与军阀投机正在进行惨烈的肉体与精神碰撞。基层部队的精神脊梁正在这笔肮脏的交易中一寸寸断裂，昔日誓言救国救民的军队正不可逆转地向着“合作军”的深渊滑落。"
 NKRsichuanCollab.17.a: "浇灭。"
 NKRsichuanCollab.18.t: "疑问"
 NKRsichuanCollab.18.d: "成都街头的阴云越压越低，空气中弥漫着一种风雨欲来的焦灼。所有人都在反复问着同一个问题，一个令整个政权心惊肉跳的问题。\n\n赵毓松虽然是党内的高层，也是曾琦最器重的私人代表，但他绝对没有胆量能够绕开中央执行委员会独自一人在上海发表那种足以定性全党政治立场的《和平宣言》！这绝对不是一场“个人叛变”的孤立投机，背后必然有着最高层的授意与默许！\n\n于是所有的流言、所有的猜忌、乃至于所有的愤怒都开始在这一连串的逻辑推演下如潮水般涌向了那个深居简出的督署核心。人人都在问，人人都在咬牙切齿地问：为什么？为什么作为党魁的曾琦依然没有通电全国开除赵毓松的党籍？为什么依然没有下达通缉令去将这个公然卖国的国贼绳之以法？\n\n这种诡异至极的沉默比一万篇汉奸宣言更让底层的党员感到透心彻骨的寒冷。曾经引以为傲的“少年中国”的信仰，在此刻被这个沉默生生撕裂。他们逐渐意识到，这或许不是什么意外的背叛，而是领袖本人正在将整个民国推向深渊。"
 NKRsichuanCollab.18.a: "曾琦他妈的在哪？！"
 NKRsichuanCollab.19.t: "真相大白"
 NKRsichuanCollab.19.d: "纸终究是包不住火的。在有心之人的操盘下，一场足以彻底击碎曾琦政治生命的爆破被精准地摆上了台面。\n\n一份由“知情人士”匿名投递至《新蜀报》的绝密电报抄件被各大抗日派系的报馆连夜加印发往了四川乃至全国的每一个角落。电报上的明码电文与曾琦的私人署名清清楚楚地向世人揭示了一个残酷的真相：那场在上海引发轩然大波、出卖民族尊严的所谓“和平运动”并非什么部下的擅权，亦非什么无可奈何的权宜，而是由曾琦本人亲自授意、由赵毓松全权代理的一场彻头彻尾、处心积虑的政治投降！\n\n真相大白，曾经高呼“内除国贼、外抗强权”的国家主义先锋，曾经被无数热血学子视为复兴希望的哲人领袖此刻已在公众与基层党员的眼中褪去了所有的光环，彻底裸露出了投机者的嘴脸。那个被精心粉饰了二十年的“救国神话”在此刻彻底碎了一地。人们悲哀地发现，他们所追随的并非什么民族复兴的引路人，而是一个在帝国主义刺刀下寻求权力的军阀政客。"
 NKRsichuanCollab.19.a: "汉奸！卖国贼！"
 NKRsichuanCollab.20.t: "弹劾计划"
 NKRsichuanCollab.20.d: "电报的曝光彻底将青年党的内部矛盾从私下猜忌推向了公开的肉体与政治决裂。曾琦那套试图左右逢源的平衡术彻底破产，如今他不仅失去了民心，更丧失了在党内道德与法理上的立足之地。\n\n李璜领衔的神社与左舜生领衔的中社在彻夜密谈后，迅速结成了坚实的政治同盟。他们草拟了一份措辞严厉的联合弹劾议案，誓言要在即将召开的全党特别代表大会上将曾琦这位背弃了党章与民族大义的“国贼”彻底罢黜出中央领导层。他们相信，只要能够在此刻完成壮士断腕式的切割，青年党就还有洗刷耻辱、重回抗战轨道的可能。\n\n然而，他们严重低估了对手的韧性。曾琦经营行社多年，早已将大批听命于他的实权官僚与旧派将领安插在党务与军务的核心。面对倒逼而来的弹劾风暴，行社高层展现出了令人胆寒的强硬。他们一方面暗中调动效忠于自己的卫戍宪兵，对倒向抗日派的基层干部进行秘密监控与停职；另一方面，在各大报刊上抛出“防共胜于一切”的论调，为曾琦的投机行径进行辩护。会场内外，刀光剑影。曾经书生意气的政党，如今已弥漫起内战的硝烟。"
 NKRsichuanCollab.20.a: "这般人物怎么能领导我们呢？"
 NKRsichuanCollab.21.t: "急电"
 NKRsichuanCollab.21.d: "随着各派系在成都的政治暗斗愈演愈烈，乃至部分驻军开始为了抗日还是妥协而摩擦走火，正在上海接受日本军部指令的曾琦终于收到了来自成都党部告急的绝密电报。电文的内容并不冗长，但字里行间那股浓重的火药味与濒临失控的混乱，让这位一向自诩冷静的当代马基雅维利手掌也不禁微微颤抖。\n\n电文报告，全党已经处于大分裂的前夜，抗日派系正准备在即将召开的全党特别代表大会上对他发起致命的弹劾，甚至有激进的下层军官正密谋发动兵变，直接接管督署。他回电成都，宣布即刻停止一切争端，自己将亲自乘车星夜返回成都，直面所有人的质疑，在特别代表大会上以至高无上的领袖威望当众阐明“国家复兴”的最终战略！\n\n这无疑是一着置之死地而后生的绝世险棋。曾琦寄希望于依靠多年来积累的领袖光环，以及暗中早已布置好的、由亲信将领掌控的卫戍部队，在大会上强行压服那些书生领袖，逼迫全党咽下“和平建国”这颗药。他笃信，只要能在大会上讲清楚这份“牺牲的必要性”，所有的狂热终将平息。"
 NKRsichuanCollab.21.a: "他会成功吗？"
 NKRsichuanCollab.22.t: "暴风雨的前夕"
 NKRsichuanCollab.22.d: "载着曾琦的专车在两队全副武装的宪兵队护送下终于缓缓驶入了成都督署的大铁门。曾经承载着少年中国之梦的这座衙门此时已被一种令人窒息的肃杀氛围所彻底笼罩。\n\n为了确保大会的“安全与秩序”，会场内外已被戒严，任何带有金属的物件都被宪兵以“防范激进分子刺杀”为名悉数收缴。\n\n坐在代表席上的李璜、左舜生等人面色铁青，身躯紧绷。而在会堂的阴暗角落，那些平日里被压制的少壮派激进分子正将手悄悄地伸进大衣的内侧。所有代表都已经落座了，整个会场静得甚至连每一声粗重的呼吸都清晰可闻。台上台下，每一个人都心知肚明，这哪里是一场讨论国是的大会，这根本就是一场生死决斗。随着主席台的大门缓缓开启，一阵沉重的脚步声在大厅内回荡，这场关于党、关于主义、关于国家命运的最终较量，终于到了必须要了断的时刻。"
 NKRsichuanCollab.22.a: "但愿如此。"
 NKRsichuanCollab.23.t: "枪响！"
 NKRsichuanCollab.23.d: "“同志们！在国家存亡的最高利益面前，我们必须放下那些不切实际的道德幻想！任何...”曾琦站在讲台的最中央，面对着台下那一双双充满愤怒、仇恨、与绝望的眼眸，他坚信只要自己能够以领袖的身份，阐明这番“牺牲”的必要性，这群书生就一定会懂得何为真正的政治！\n\n“砰！砰！砰！”\n\n三声震耳欲聋的枪响打断了演讲。曾琦脸上的表情瞬间凝固，他的胸膛上赫然爆开了三朵刺眼的血花。这位一直自诩掌控着全局的当代马基雅维利，这位试图在虎狼环伺下通过权谋再造中国的国家主义革命家，眼神中充满了不可置信的惊恐与迷茫，身体在惯性下向后猛地一仰，重重地砸倒在了讲台那沾满灰尘的血泊之中。\n\n“委员长遇刺了！”\n\n尖叫声、座椅翻倒的巨大碰撞声、以及随后警卫部队疯狂而盲目的还击声瞬间淹没了一切，会堂内顿时沦为了一座惨绝人寰的修罗场。那开枪的刺客在打空了弹匣后，面对冲上来的宪兵，从容地将黑洞洞的枪口抵在了自己的下颚——看着讲台上那具曾经不可一世的尸体，所有人都在发抖。至此，曾经的信仰已经死去，成都在这一刻彻底失控了。"
 NKRsichuanCollab.23.a: "完蛋了..."
 NKRsichuanCollab.24.t: "血染之地"
 NKRsichuanCollab.24.d: "曾琦的暴毙并没有如抗战派所预想的那般带来拨乱反正的清明，相反，它将整个四川推入了一场更为惨烈、更为彻底的深渊。李璜与左舜生两位元老试图接管成都的军政大权，发布宣言与日伪彻底决裂，然而现实是残酷的。他们绝望地发现，自己严重低估了曾琦在位时对整套军队与党务系统的深度渗透。\n\n尽管名义上他们站在道义的制高点，但各路川军宿将为了保住他们在日本“和平共荣”的担保下所获得的既得利益，断然拒绝听从这几个“只懂教条书生”的调遣。一夜之间，成都的街头巷尾再次被荷枪实弹的宪兵所接管。一场针对神社、中社以及所有死杆抗日派系的秘密大清洗在行社的操盘下以雷霆万钧之势展开。\n\n锦江水再次被染红了。曾琦虽然带着阴谋死去了，但他一手锻造、最终又因投机而走向腐化的政治遗产正在这片古老的巴蜀大地上横行肆虐。"
 NKRsichuanCollab.24.a: "曾琦留下的遗产依旧存在..."
 NKRsichuanCollab.25.t: "领导层更迭"
 NKRsichuanCollab.25.d: "死了这么多人，跑了这么多核心干部，曾经引以为傲的中央党部机构已在内部的血腥倾轧中土崩瓦解。原本严密的科层制，在这一周内退化为了各路将领各扫门前雪的军阀雏形。\n\n每日的公函不是石沉大海，就是被拦截扣押。成都市面上的米价、盐价，在这场权力真空的恐慌下开始疯狂飙升。军人们在街头横行霸道，勒索商贾；文人们关紧门窗，在暗处烧毁着可能招致杀身之祸的文件；不明身份的武装人员在夜间的胡同里频繁交火。整个四川，这片本应作为国家复兴之大本营的土地，此刻却陷入了一种叫天不应、叫地不灵的无政府梦魇之中。各地的党部和驻军都在观望、在串联、在磨刀霍霍。那些侥幸活下来的党内中层们面对着这份堆积如山的烂摊子，一个个面色苍白，手足无措。没有人知道这场失控的雪崩最终会停在何处，也没有人敢去试图阻挡那股即将重新吞噬一切的阴冷暗流。"
 NKRsichuanCollab.25.a: "...我怎么知道？"
 NKRsichuanCollab.26.t: "中央政治行动委员会"
 NKRsichuanCollab.26.d: "当混乱发酵至临界点，一支车队在一队武装的簇拥下大摇大摆地驶入了成都督署的大门。\n\n赵毓松，这个曾经作为探子被派遣、一手在上海签下卖国宣言的“全党公敌”此刻却在行社残余势力的簇拥下高调回归。他毫无愧疚，亦无半分悲色，利用上海派遣军提供的巨额活动经费迅速收买了驻防成都的川军将领，并在一次被严密枪口所笼罩的“紧急党务扩大会议”上，宣布成立“中国青年党中央政治行动委员会”（简称中政委）。赵毓松宣称，鉴于党在危难之际群龙无首，中政委将全权接管党务与政权，继承曾琦委员长“和平救国”的遗志，并立刻向日方输诚。\n\n曾经高呼“内除国贼”的国家主义者们只能在极度的屈辱与恐惧中，眼睁睁看着这位昔日的文案小吏坐在了权力的王座之上。赵毓松的讲话声在会堂内回荡，他以一种高高在上的施舍者姿态将自己的行径定义为“大局为重”的无奈担当。曾经的骨干们只得捏着鼻子承认了他作为曾琦接班人的地位。毕竟，在这片权力的废墟上，再也没有人能发放得出让军队听命的大洋了。"
 NKRsichuanCollab.26.a: "先生们，我们得把注意力放在大局上。"
 NKRsichuanCollab.27.t: "大分裂"
 NKRsichuanCollab.27.d: "如果说曾琦时代的妥协，尚且披着一层“马基雅维利”式的悲壮政治权谋，那么赵毓松的上位，则是一场赤裸裸的投敌狂欢。这份荒诞的现实引发了中国青年党最为彻底而悲惨的大分裂。\n\n“那我们算什么？我们抛头颅洒热血，难道就是为了给赵毓松这群狗汉奸当垫脚石吗？！”愤怒与绝望在各个防区内引爆。大批青年党人当众撕毁了自己珍藏多年的入党证明书，砸烂了刻着醒狮的牌匾，在公开通电中痛斥中政委为人面兽心的国贼。\n\n它分裂成了支离破碎的两半：一半逃入山区，在凄风苦雨中继续着悲壮的抗日游击，试图延续“少年中国”的最后气节；另一半，则在赵毓松的率领下，带着金条与刺刀的担保，在共荣的泥沼中摇尾狂狂。昔日引以为傲的同志，今日成了不共戴天的死敌。"
 NKRsichuanCollab.27.a: "你是爱国者，我就不是了？！"
 NKRsichuanCollab.28.t: "党外支持"
 NKRsichuanCollab.28.d: "在失去民心与基层党务后，赵毓松的中政委在政治上陷入了极度的孤立。但在这个奇诡的政治乱世中，最先向这些卖国者伸出援手的是一群同样在乱局中抛弃了底线的同类。\n\n来自“中国国家社会党政务特别委员会”（政特委）的贺电。诸青来——这位曾留学日本，浸淫上海新闻与金融界的国社党成员果断背弃了张君劢，带着大批亲日派另立中央，公开宣称中日协和。贺电中，诸青来狂热地称赞中政委是“顺应东亚新局势的中流砥柱”，并表示愿以新政权“盟友”的身份共襄盛举。除此以外，还有致公党、中国共和党等一众平日里各怀鬼胎的合作者争先恐后地聚集到了一起。\n\n这场面在旁人眼中简直是一场滑稽到了极点的聚会。曾经彼此鄙夷的政客与军头如今正在靠着日本人提供的金条和刺刀拼凑出一个看似多党的“合法”政权。赵毓松对此照单全收，他在给政特委的回电中肉麻地感谢各位的“深明大义”。只要能把这个多党分赃的草台班子拼凑起来，骗过日本人的政治审查，他哪管这群人到底是不是政治上的烂疮！"
 NKRsichuanCollab.28.a: "感谢各位兄台！"
 NKRsichuanCollab.29.t: "军队问题"
 NKRsichuanCollab.29.d: "在政客的圆桌上，赵毓松利用日方的背书和金钱拼凑出了一套足以唬弄派遣军的政治门面。然而他心里比谁都清楚，在中国的土地上，笔杆子写出的合法性永远敌不过枪杆子的动摇。在如今青年党已经撕裂的当下，基层士兵中弥漫着巨大的迷茫与抗拒。\n\n为此，赵毓松制定了一套极其阴险却又立竿见影的统御方略。他们彻底放弃了感化底层士兵的企图，转而通过利益输送，全面拉拢把持军权的高级将领。对于那些曾在旧军阀时代摸爬滚打、早已磨灭了气节的老将，中政委慷慨地开放了地方产业的留成权以及源源不断由横滨正金银行汇来的巨额军饷。为了进一步将这群武夫死死捆绑，他在军中大肆宣扬“反共主义”的神圣性，将原本对外抗日的怒火巧妙地转移到了对赤色游击队的仇恨之上。\n\n在金钱的慰藉与偏执的仇恨驱动下，原先动摇的军队骨干们逐渐驯服了。在明晃晃的金条与军令状面前，这支脱胎于革命军的武装力量正在迅速褪去残存的爱国底色。"
 NKRsichuanCollab.29.a: "反对赤色毒害！"
 NKRsichuanCollab.29.tt: "§Y不配合现有工作的将军将被解雇！§!"
 NKRsichuanCollab.30.t: "全民政府之新生"
 NKRsichuanCollab.30.d: "成都督署那曾经被视为“国家主义大本营”的礼堂如今已被粉刷一新，挂上了“和平建国”的新招牌。自政变与大分裂以来，赵毓松与他的亲日同僚们在此夜以继日地忙碌，试图打造一套能向国内外、尤其是向日本人交差的政治机器。\n\n但这依然不够，日本华南方面军的军官们在会议桌上已经变得极度没有耐心，他们直接挑明了底线：四川盆地终究不过是偏安一隅的囚笼，若是中政委想真正证明自己有统合全中国的“价值”，就必须跟随皇军的脚步顺江东下，夺下那个曾是民国政治心脏的旧都——南京。\n\n锦江的流水在窗外依旧奔腾，无论未来等待他们的是繁荣还是毁灭，这座政权的根基，早已在这片被鲜血浸透的蜀地大地上，铸下了无法被洗刷的污点。\n\n一场即将要在金陵上演的，群魔乱舞的闹剧，正徐徐拉开大幕。"
 NKRsichuanCollab.30.a: "挥师东进！"
 NKRsichuanCollab.30.tt: "§Y新国策将解锁，如今，你将同维新政府以长江为界分割中国大地。§!"
 NKRsichuanCollab.31.t: "和平建国军"
 NKRsichuanCollab.31.d: "#新建和平建国军哦哦哦"
 NKRsichuanCollab.31.a: "反赤救国！"
 NKRsichuanCollab.32.t: "清乡运动"
 NKRsichuanCollab.32.d: "#如题，清乡开始咯"
 NKRsichuanCollab.32.a: "我们必须要铲除任何可能的抵抗势力！"
 NKRsichuanCollab.33.t: "新国民运动如火如荼"
 NKRsichuanCollab.33.d: "#不赖"
 NKRsichuanCollab.33.a: "新国民之真谛，便是要..."
 NKRsichuanCollab.34.t: "何为新国民？"
 NKRsichuanCollab.34.d: "#上个事件之后"
 NKRsichuanCollab.34.a: "这就是新国民！"
 NKRsichuanCollab.35.t: "东亚联盟之唯一构想"
 NKRsichuanCollab.35.d: "#全亚细亚人联合起来！"
 NKRsichuanCollab.35.a: "为了我们的亚细亚！"
 NKRsichuanCollab.36.t: "帝国主义之荼毒"
 NKRsichuanCollab.36.d: "#几十年来，西方帝国主义者为非作歹，哎呀怎么这么坏"
 NKRsichuanCollab.36.a: "我们一定能保卫东亚！"
 NKRsichuanCollab.37.t: "合作者、汉奸"
 NKRsichuanCollab.37.d: "#先是我们，然后是国社党，又是致公党、社民党，之后是谁？"
 NKRsichuanCollab.37.a: "只会越来越多的。"
 NKRsichuanCollab.38.t: "领袖原则"
 NKRsichuanCollab.38.d: "#赵主席是兴福中华保卫东亚的唯一领袖！"
 NKRsichuanCollab.38.a: "万岁！"
 NKRsichuanCollab.39.t: "曾琦的遗产"
 NKRsichuanCollab.39.d: "#曾琦也值得我们铭记，他也是伟大的和平运动引路人，我们党的创始者！"
 NKRsichuanCollab.39.a: "曾委员长在天之灵一定会欣慰的。"
 NKRsichuanCollab.40.t: "“七十六号”"
 NKRsichuanCollab.40.d: "#特务情报这一块"
 NKRsichuanCollab.40.a: "我们是利刃。"
 NKRsichuanCollab.41.t: "共和党再生？"
 NKRsichuanCollab.41.d: "随着华中战线的尘埃落定，武汉三镇这座曾见证辛亥首义与大革命风暴的枢纽城市迎来了一次出人意料的权力重组。转向亲日姿态的何佩瑢今日在汉口旧督署的旧址上正式宣告了“中国共和党”的重新集结。\n\n他及其政治集团明确以民初黎元洪旧部的“共和法统”自居，在重新升起铁血十八星旗的同时，其政治宣言着重强调了“全民主义”与“五族共和”的经典论述。从人员构成来看，这支重新挂牌的政治队伍，主要吸纳了一些不甘向北京效忠的北洋旧部、地方实力派以及寻求政治庇护的商界精英。何佩瑢本人拥有日本陆军士官学校的留学背景，且长期在北洋时期各省军政体系中担任要职。他深谙在复杂地缘政治夹缝中维持生存的平衡之术，非常清楚在维新政府以及革新政权相互博弈的当下，各方都需要一个在华中地区拥有行政经验与地方人脉的政治实体来稳定社会秩序。\n\n在即将召开的国民大会中，共和党的集体亮相为何佩瑢赢得了不可忽视的议价筹码。他们的政纲刻意回避了中日之间的直接军事对抗，转而将重心放在“恢复地方元气”与“中日协作下的地方自治”上。这面承载着民初记忆的十八星旗，如今成为了何佩瑢整合华中资源、向南京乃至东京争取政治空间与防区自治权的合法性工具。对于青年党中政委而言，共和党的存在既是充实南方阵营以对抗北方政府的必要助力，也是一个在未来议会政治中随时可能发生摇摆的独立变数。"
 NKRsichuanCollab.41.a: "呃，好吧？"
 NKRsichuanCollab.41.b: "武汉维新会...等下，我在想些啥？"
 NKRsichuanCollab.42.t: "竭诚欢迎"
 NKRsichuanCollab.42.d: "当革新政府的代表团抵达广州时，迎接他们的是一场规模盛大、组织严密的欢迎仪式。在这场确认华南政治归属的仪式上，居于核心地位的是以陈炯明旧部、粤系法政元老自居的金章以及他所领导的重新整合后的“中国致公党”。\n\n金章在致辞中明确表达了对当前时局的政治判断。他将新政权的建立以及日军的军事存在解读为打破既有中央集权体制、推动华南地方政治重组的历史契机。他重申致公党将继续秉持“联省自治”的核心纲领，并主张在新的“东亚协作”框架下，构建一个享有高度自治权限、经济自由的大美新广东。金章的优势不仅在于其深厚的同盟会资历，更在于他成功整合了致公党内部的各派力量并有效调动了横贯海内外、盘根错节的洪门社会网络，从而在短时间内完成了对华南基层秩序的实际接管。\n\n目前毫无疑问的是，致公党显然将凭借其强大的地方动员能力和复杂的社会背景在国民大会的席位分配与权力博弈中成为一支拥有高度自主权的政治力量。对于中政委而言，金章的表态虽然在形式上完成了南方的整合，但致公党强烈的地方本位主义意味着中央政府对华南的统治将长期处于一种间接的、高度妥协的状态。"
 NKRsichuanCollab.42.a: "可得盯紧这帮洪门。"
 NKRsichuanCollab.42.b: "和他们的合作有利于宪政实现。"
 NKRsichuanCollab.43.t: "上海工联的扩张"
 NKRsichuanCollab.43.d: "传统的左翼工人运动在遭遇严厉的治安肃清后留下了巨大的组织真空。为了确保战略物资生产和城市运转，一个名为“全华联合工会”的庞大组织在官方的支持下迅速崛起。\n\n执掌这一机构的张克昌，凭借其在青帮“恒社”积累的深厚社会管理经验，以社会部次长的官方身份对华东地区零散的工会进行了系统性的强制整编。在这个被称为连合的新工会体系内，传统的罢工抗议与集体议价被一套严格的、强调生产效率与劳资协作的管理制度所取代。张克昌将帮会的层级管理模式与现代工厂的督导制度相结合，为新政府的工业恢复政策提供了强有力的组织保障。\n\n然而，随着全华联合工会将触角延伸至数以百万计的产业工人与城市劳工群体中，张克昌手中的政治筹码也随之水涨船高，这位背景复杂的工运领袖讽刺地逐渐成为了“劳工代表”，实质上接管了曾属于左翼政党的政治生态位。如今看来，全华联合工会已经不仅仅是维持和平区工业秩序的必要工具，更是一个随时可能因利益分配不均而引发内部动荡的庞然大物。"
 NKRsichuanCollab.43.a: "谁能保证他们里面没有真赤匪？"
 NKRsichuanCollab.43.b: "泛亚工人，联合起来！"
 NKRsichuanCollab.44.t: "法西斯，行动！"
 NKRsichuanCollab.44.d: "当“中华战斗法西斯”的黑色制服方阵出现在首都时，这种源自欧陆的激进政治思潮正式在中国政治舞台上取得了合法席位。与那些主要诉诸地方利益或传统法统的政党不同，战斗法西斯展现出了一种试图彻底重塑国家结构与国民精神的狂热理论诉求。\n\n以周毓英为首的“极权政策研究会”构成了运动的理论大脑。周毓英深受意大利革命行动法西斯理念影响，主张建立一个全能型的国家机器对国民经济的全面统合与阶级调和。极政研对议会中那些传统的右翼保守势力和自由资本持强烈的不信任态度，这种带有强烈“反资本主义”与“计划经济”色彩的法西斯论调不仅引起了国内诸传统派系的警惕，甚至让日方顾问对这股潜在的“极致主义”力量感到不安。\n\n另一方面，以钱旦为精神领袖的“中华法西斯青年团”则充当了运动的行动臂膀。钱旦的信徒们对复杂的经济统制理论兴趣寥寥，他们更强调领袖的绝对意志与国民的武勇精神。这群年轻人致力于通过准军事化的街头动员与严格的纪律训练来塑造所谓“钢铁意志的新国民”。极政研的理论建构与法青团的行动主义在同一张政治议席上形成了一种微妙的共生与张力。对于试图维持多党平衡的青年党来说，如何将这种狂热的政治能量纳入政府的制度框架内必然是个大问题。"
 NKRsichuanCollab.44.a: "我很担忧他们的...革命性。"
 NKRsichuanCollab.44.b: "但也无伤大雅？"
 NKRsichuanCollab.45.t: "先总理遗教"
 NKRsichuanCollab.45.d: "在革新政府的政治重组中，基于“低调俱乐部”班底改组成立的新中国国民党成为了最引人注目的政治实体之一。\n\n这批脱离了巴黎、莫斯科流亡者的政客与官僚在新的政治环境下试图夺回对孙中山政治遗产的解释权。周佛海在演讲中，将此前革命路线的失败归咎于战略误判与政策激进，并宣称他们选择与日本寻求政治妥协，是基于对孙中山“大亚洲主义”理论的重新发掘。他们主张以“中日协作、共同防赤”为新的立国基石，试图以此为依据在新的地缘格局下对国家进行体制重构。\n\n这个新国民党的内部构成呈现出高度的复杂性。它不仅吸纳了对前期路线深感忧虑的国民党右翼元老，也包容了大量在战局变幻中寻求新政治依托的地方实力派与技术官僚。作为曾经响彻中国数十余年的第一大党，国民党的政治底蕴与官僚人脉依然深厚，他们绝不会满足于在新的权力架构中扮演次要角色。"
 NKRsichuanCollab.45.a: "国民革命归来！"
 NKRsichuanCollab.45.b: "大亚洲主义合流，真乃一件幸事！"
 NKRsichuanCollab.46.t: "民主——自由"
 NKRsichuanCollab.46.d: "任援道及其组建的“民主自由党”在国民大会中的出现，是中国近代政治生态中实用主义与武装割据现象的典型缩影。\n\n任援道本人拥有极为丰富的军政履历，他早年毕业于保定军校及日本陆军士官学校，在北洋时期各军阀派系的权力更迭中始终能保持其政治地位，但随着国内局势的剧变，他展现出了极强的资源整合能力，迅速收编了大量被打散的军队余部、地方保安团及民间武装，在极短的时间内构建起了一支不容小觑的独立军事力量。凭借手中掌握的实质性武装，他成功地与急需扩充实力阵营的革新政府结盟，从而在新政权中确立了自己作为实力派的地位。\n\n令人瞩目的是，这位出身传统军界的将领，却通电宣布解除军职，跻身政界（尽管他依旧通过自己的亲信控制着军队），选择以“民主自由党”为名，并将“捍卫自由贸易”、“践行宪政民主”作为其核心政纲。在外界看来，这套源自西方的政治语汇与任援道本人的军阀背景存在着显著的错位。然而，在当前的政治语境下，这种包装为任援道的军事集团披上了一层现代政党的合法外衣，提高了其在日方及南京政府面前的政治身价。目前看来，民自党必能在革新政府的政治版图中稳稳地占据一席之地。"
 NKRsichuanCollab.46.a: "你真的能相信这么一个人吗？"
 NKRsichuanCollab.46.b: "民自党会是我们亲密的盟友！"
 NKRsichuanCollab.47.t: "国社党扩张"
 NKRsichuanCollab.47.d: "由诸青来、陆鼎揆等人创立的“中国国家社会党政务特别委员会”在成立之初曾被国社党中央视为偏离路线的异端，并被正式宣告开除党籍。然而，随着革新政府的不断扩张，政特委的政治地位发生了戏剧性的逆转。\n\n凭借着与青年党中政委的深度合作以及在上海、南京等地金融、新闻界的深厚人脉，诸青来等人成功地在新的行政架构中获取了关键的资源与职位。这种现实政治中的成功产生了强大的磁吸效应：许多曾经追随张君劢流亡、在资源匮乏与政治边缘化中苦苦挣扎的原国社党成员及知识分子在目睹了政特委的崛起后开始重新评估自己的政治选择。\n\n在“曲线救国”与“在敌占区维持行政运转”等实用主义论述之下，大批国社党精英开始陆续归来，向政特委递交了归队申请。诸青来对这些拥有正统学术背景与官僚经验的归来者表示了欢迎——显然，原本被视为“伪中央”的政特委凭借其在新秩序中的既得利益与行政能力，如今反而成为了代表国家社会主义政治光谱的实质性正统力量。"
 NKRsichuanCollab.47.a: "后来居上的正统。"
 NKRsichuanCollab.47.b: "致国家主义！"
 NKRsichuanCollab.48.t: "三K危机"
 NKRsichuanCollab.48.d: "一份极其荒诞的情报被呈递到了中政委的办公桌上。情报显示，在华东地区活动的江亢虎及其“中国社会民主党”内部，近期流传起了一股极其诡异的流言。几份地下小报竟堂而皇之地指控这个高举大亚洲主义与革新社会主义大旗的亲日左翼政党，暗中与远在大洋彼岸的美国“三K党”存在着不可告人的联系。\n\n“一个宣扬泛亚亲善协和的政党，和一群成天戴着白头罩的白人至上主义者勾结？这群造谣的人是疯了吗？”看着这份报告，办公桌后的官员只觉得太阳穴在隐隐作痛。在这个群魔乱舞的新秩序下，各路政治投机客为了争夺未来新秩序的一席，相互倾轧的手段早已毫无底线。这大概率是某些敌对派系为了打压政敌而刻意炮制的拙劣政治笑话，又或者是某种令人啼笑皆非的翻译错误。\n\n然而，这种挑战人类政治常识的指控还是让整个革新政府的颜面显得极其滑稽。高层不得不下令让宣传部门去处理这出莫名其妙的闹剧，以免让日本人把他们看作一群连造谣都不会的精神病人。"
 NKRsichuanCollab.48.a: "莫名其妙的..."
 NKRsichuanCollab.49.t: "大汉之意"
 NKRsichuanCollab.49.d: "在众多新兴的政治派系中，由张鸣组建的“中国国民革新党”无疑在意识形态上占据了最特殊、也最引发争议的光谱位置。张鸣，这位出生于台湾、早年曾长期留学日本并深受其近代政治理论影响的政客在新秩序建立后抛出了一套以“建设大汉国”为核心诉求的激进政治纲领。\n\n国民革新党的理论基点，是对近代以来中华共识的全面解构。他们主张一种“大汉民族主义”、一种“五族解放”理论。在张鸣的政治规划中，他主张放弃对东北、西北等广袤边疆地区的传统法理主张，支持实现所谓“汉、满、蒙、回、藏”的各自独立建国；随后，这个纯粹的“大汉国”，将与缅甸、印度、大日本帝国、暹罗、安南等国，共同组成一个“亚洲国际联盟”，以此来抵御西方势力的影响，最终契合日本所描绘的“大东亚新秩序”。\n\n谁会支持呢？显然绝大多数民众和政界商界人士都不会对其有所响应。许多民意呼声已经要求政府立刻查封这个中国国民革新党并且将其列为非法组织，但迟迟不动的革新政府显然是在外部压力之下被迫无动于衷——为什么呢？答案自然是大家都相互所默契的了。"
 NKRsichuanCollab.49.a: "一群疯子..."
 NKRsichuanCollab.50.t: "宁京对峙"
 NKRsichuanCollab.50.d: "#战事已经告终，现在的局势就很搞了，一南一北两个政权，尽管官方口径两个政权的合并似乎马上就快了，但是个人都看得出来两边隔阂严重。"
 NKRsichuanCollab.50.a: "和十几年前一模一样。"
 NKRsichuanCollab.51.t: "五色乎？国会乎？"
 NKRsichuanCollab.51.d: "#你声称自己是一个南方的革新政府，然而事实是你成了啥？北方的国会姑且还能开上一开——奉系收留的安福议员和北京的曹锟国会一堆人凑一起，还真像回事。至于南方，凑得齐几个人？"
 NKRsichuanCollab.51.a: "我们的合法性岌岌可危！"
 NKRsichuanCollab.52.t: "大宪政运动"
 NKRsichuanCollab.52.d: "#在革新政府的支持下，一场名为大宪政运动的政治运动开启了。这场运动鼓吹国家要立刻转向多党的、但也是全民的、一致的、无阶级的宪政民主。"
 NKRsichuanCollab.52.a: "我们热诚支持宪政运动。"
 NKRsichuanCollab.53.t: "社论支持大宪政运动"
 NKRsichuanCollab.53.d: "#如题，嗯至少对于这些媒体公告而言如此，有点搞"
 NKRsichuanCollab.53.a: "媒体站在我们在这边。"
 NKRsichuanCollab.54.t: "上海之声"
 NKRsichuanCollab.54.d: "#日本上海方面认可我们的行动，反正我们就是他们扶持的..."
 NKRsichuanCollab.54.a: "也罢。"
 NKRsichuanCollab.55.t: "宪政筹备方向？"
 NKRsichuanCollab.55.d: "#归根结底，这是我们自己在处理。同时我们还要面对北方的压力...最终筹备得出结论，我们应该仅暂时弄一个临时的政府组织大纲而非新宪法，毕竟和北方的脸皮还没撕破。"
 NKRsichuanCollab.55.a: "嗯，看起来确实是这样。"
 NKRsichuanCollab.56.t: "撤军方案"
 NKRsichuanCollab.56.d: "#日本人早就承诺过要撤军，他们提出的方案是在大陆反赤统一完成之后正式撤军，不过有点搞。。。事实上嘛...嗯，总之我们先预设以方案为准就是了"
 NKRsichuanCollab.56.a: "人为刀俎，我为鱼肉。"
 NKRsichuanCollab.57.t: "议会制的具体方向"
 NKRsichuanCollab.57.d: "#最终我们打算搞一院制，嗯很大胆，那就这样呗"
 NKRsichuanCollab.57.a: "国民大会..."
 NKRsichuanCollab.58.t: "总统制？内阁制？"
 NKRsichuanCollab.58.d: "#我们也讨论过总统制和内阁制，最后觉得还是半总统制更适合我们现在的情况，毕竟我们现在的政治环境比较特殊，完全内阁的议会制可能会导致更多的政治不稳定。"
 NKRsichuanCollab.58.a: "就这样定了。"
 NKRsichuanCollab.59.t: "杯酒释军权？不..."
 NKRsichuanCollab.59.d: "#看起来我们对于和平建国军的军头是杯酒释军权了，但实际上呢？他们很轻易就能转入政治并且通过裙带关系保留原有的影响力...任援道不就是这样吗？"
 NKRsichuanCollab.59.a: "但也没有别的办法。"
 NKRsichuanCollab.60.t: "施压"
 NKRsichuanCollab.60.d: "#北方的维新政府通过各方面影响力开始向我们施压，我们则尽可能地避免这种压力影响。不过好在诸多心怀鬼胎的南方势力有一个共识：那就是北佬别他妈再来压制我们了！"
 NKRsichuanCollab.60.a: "立刻展开反制！"
 NKRsichuanCollab.61.t: "新时代的联省自治"
 NKRsichuanCollab.61.d: "#各方地方势力进一步扩大了对联省自治的诉求，呃，好吧，我们只能尽可能在明面上去顺应，毕竟我们也需要他们的支持。"
 NKRsichuanCollab.61.a: "我们必须借此反对北方！"
 NKRsichuanCollab.62.t: "兴亚院扩张"
 NKRsichuanCollab.62.d: "#日本方面的官僚也上压力了，他们设立了华东-华南联络部，要求扩大对我们控制区域的经济统合，服务于大亚洲解放事业"
 NKRsichuanCollab.62.a: "我们接受。"
 NKRsichuanCollab.63.t: "华中振兴会社"
 NKRsichuanCollab.63.d: "#日本人的新公司，哈，这不就是又一个满铁吗？"
 NKRsichuanCollab.63.a: "我们需要资本..."
 NKRsichuanCollab.64.t: "援助之手"
 NKRsichuanCollab.64.d: "#外忧内患之际，国社党政特委倒是还愿与我们同舟共济——诸翔自己的权力也并非稳定，和他结盟是我们现在最好也是最稳定的选择。"
 NKRsichuanCollab.64.a: "握握手。"
 NKRsichuanCollab.65.t: "利益交换"
 NKRsichuanCollab.65.d: "#我们和国社党方面作出承诺，他们一定会在新政府中获得数个部长职位"
 NKRsichuanCollab.65.a: "梁启超的遗产。"
 NKRsichuanCollab.65.tt: "§Y交易已经达成，你现在§R必须§!让§G国社党-政特委§!加入政府——我们在同一条船上。§!"
 NKRsichuanCollab.66.t: "扩大民政治理"
 NKRsichuanCollab.66.d: "#军头必须被压制——至少在日本人的帮助下，我们能让华东的情况得到相当程度的缓解。"
 NKRsichuanCollab.66.a: "还行吧。至少现在如此。"
 NKRsichuanCollab.67.t: "组织条例出台！"
 NKRsichuanCollab.67.d: "#如题，组织条例出台，在我们的操纵下，媒体基本都对此欢呼雀跃，在几天后组织条例就将得到现任临时执政的批准。"
 NKRsichuanCollab.67.a: "不错！"
 NKRsichuanCollab.68.t: "组织条例通过！"
 NKRsichuanCollab.68.d: "#如题，但接下来呢？嗯。。。很明显，大选。虽然我们都知道这场大选肯定有点令人忍俊不禁，但我们还真得认真对待这玩意——日军虽然疯批，但我们如果真能靠这个表现出自己的合法性，那就整呗"
 NKRsichuanCollab.68.a: "“大选”，在日本人之下。"
 NKRsichuanCollab.69.t: "国家主义的回响"
 NKRsichuanCollab.69.d: "#国家主义的宣传越来越多，只不过都和亲日包装在一起"
 NKRsichuanCollab.69.a: "今日的国家主义..."
 NKRsichuanCollab.70.t: "神圣联合？"
 NKRsichuanCollab.70.d: "#我们依旧在提神圣联合，不过哈哈，嘴上讲可没法让别人心甘情愿来给你当狗"
 NKRsichuanCollab.70.a: "...真乃败笔！"
 NKRsichuanCollab.71.t: "枪杆子与选票"
 NKRsichuanCollab.71.d: "#任援道可能自称退出军界，可他那些手下可不是吃干饭的，民主自由党的“支持率”水涨船高"
 NKRsichuanCollab.71.a: "于是那就成了他的私人封地？"
 NKRsichuanCollab.72.t: "暗流涌动"
 NKRsichuanCollab.72.d: "#真正的左翼工人运动依旧在不断发展，无数人受不了这种压迫"
 NKRsichuanCollab.72.a: "警察呢？！"
 NKRsichuanCollab.73.t: "罢工与刺杀"
 NKRsichuanCollab.73.d: "#工人运动的激烈程度已经让我们有点措手不及了，罢工、暴乱、甚至是暗杀事件层出不穷，虽然我们已经加大了警力的投入，但还是有些地方连参选者都被刺杀了"
 NKRsichuanCollab.73.a: "快点镇压下去！"
 NKRsichuanCollab.74.t: "宪兵队登场"
 NKRsichuanCollab.74.d: "#于是我们喊日本人来了，我们有啥办法？"
 NKRsichuanCollab.74.a: "枪刺之下..."
 NKRsichuanCollab.75.t: "绝密"
 NKRsichuanCollab.75.d: "#来自七十六号的消息，北方那群维新政府的臭逼果然也在破坏我们的大选..."
 NKRsichuanCollab.75.a: "给我接影佐！"
 NKRsichuanCollab.76.t: "内部施压"
 NKRsichuanCollab.76.d: "#看起来上海派遣军那边成功说服了大本营并且向天津军和关东军施压，使他们停止了对南方大选的破坏活动。"
 NKRsichuanCollab.76.a: "暂时消停了..."
 NKRsichuanCollab.77.t: "洗牌"
 NKRsichuanCollab.77.d: "#这么多破事都消停了，希望选举能够正常吧？"
 NKRsichuanCollab.77.a: "但愿？"
 NKRsichuanCollab.78.t: "投票日"
 NKRsichuanCollab.78.d: "#所以投票日到了，投票率很低...但我们还是宪政国家，对吧？"
 NKRsichuanCollab.78.a: "投出你的一票。"
 NKRsichuanCollab.79.t: "..."
 NKRsichuanCollab.79.d: "#其实我们也想过操纵票箱，甚至说这对于我们来说再常见不过了。但事实上，在多方面的制衡之下，我们甚至真的没法大力干涉选举！最多最多也只能保证我们肯定还坐在执政党的位置上"
 NKRsichuanCollab.79.a: "讽刺，如今反而真成了“民主”？"
 NKRsichuanCollab.80.t: "选举结果公示..."
 NKRsichuanCollab.80.d: "#革新政府选举结果出来了，显示gui"
 NKRsichuanCollab.80.a: "让我看看结果..."
 NKRsichuanCollab.81.t: "组建政府"
 NKRsichuanCollab.81.d: "#选举结果已经出来了，至少我们还是第一大党...现在得组建政府了"
 NKRsichuanCollab.81.a: "既然这样的话..."
 NKRsichuanCollab.82.t: "革新政府第一届民选政府就职"
 NKRsichuanCollab.82.d: "#执政联盟已经组建，好吧，那就开始吧。"
 NKRsichuanCollab.82.a: "前方的工作不少..."
 NKRsichuanCollab.82.tt: "§Y你成功组建了第一届...民选政府！现在你需要开始处理各种政治事务了，祝你好运！§!§!"
