 SZC_YCPC_YCPCPAC_party: "中国青年党(中政委)"
 SZC_YCPC_YCPCPAC_party_long: "中国青年党 - 中央政治行动委员会\n§L中国青年党中央政治行动委员会成立于曾琦遇刺后的党务危机之中。赵毓松以代表的身份借党中央群龙无首之机，联合部分党务骨干与对局势失去信心的温和派成员组建了这一委员会，宣称以此填补权力真空、维持党务运转。\n\n在对日立场上，中政委延续了基本方针，主张在现有局势下以谈判代替对抗，寻求与日方达成某种形式的妥协性安排，并且在谈判中取得了有效的进展，一跃而上获得了日本华南方面事务负责人的认可。这一立场使其与抵抗路线的各派产生了根本性裂痕，也使中政委在大分裂后的青年党格局中处于一个孤立而尴尬的位置——它既无法获得抵抗派的认可，又始终未能在日方主导的政治秩序中同北方同僚争得真正举足轻重的地位，甚至不能完全主导其宣称所谓“宪政民主实践”下国民大会的简单多数主导权。§!"
 SZC_YCPC_NYCP_party: "中国新青年党"
 SZC_YCPC_NYCP_party_long: "中国新青年党\n§L§!"
 SZC_YCPC_NSPPSC_party: "中国国社党(政特委)"
 SZC_YCPC_NSPPSC_party_long: "中国国家社会党 - 政务特别委员会\n§L国家社会党政务特别委员会由诸青来、陆鼎揆等人于日军占领格局明朗之际另立，他们借助了党内对张君劢一人独裁的不满，与张君劢主导的国社党中央部正式决裂，成立了新的亲日中央。诸青来本人长期主持上海新闻与金融界事务，在沪上各界积累了相当的人脉网络；这批出走者以政务特别委员会为名另起炉灶，旋即被党中央开除党籍。\n\n政特委在意识形态上基本沿用国社党原有的国家社会主义与议会宪政框架，但在对日合作问题上与旧派分道扬镳。只不过，在中华民国国民大会正式召开后——讽刺地，政务特别委员会与青年党合作派的相互扶持成功使得他们在正统层面上已经远超了无法进入全国国会的旧国社党。§!"
 SZC_YCPC_DLP_party: "民主自由党"
 SZC_YCPC_DLP_party_long: "民主自由党\n§L民主自由党由任援道出面组建，以自由贸易与宪政民主为标榜。任援道本人履历颇为丰富：保定军校、日本陆士出身，北洋时期辗转于各省军政要职之间，此后又以冀察政务委员会外交委员的身份在华北政坛活动。日军南下后，他收编散兵游勇，迅速牵上了与青年党中政会线，成为了举足轻重的实力派人物。\n\n民主自由党所标榜的那套自由贸易与宪政论述显然不过是任援道在新政治格局下为自己量身定制的一件体面外衣，但对于一个以收编残兵起家、在政权之间腾挪自如的人而言，民主自由党能在国民大会中以如此多席位的反对党身份立足，倒也真是一件奇事。§!"
 SZC_YCPC_REP_party: "中国共和党"
 SZC_YCPC_REP_party_long: "中国共和党\n§L中国共和党由何佩瑢于湖北宣告成立，以民初黎元洪旧部的共和党法统自居，党旗沿用铁血十八星，标榜全民主义。这支队伍的成色如何，外界自有公论；但其在新政治格局下的一次集体亮相，确实为何佩瑢提供了与各方周旋的政治筹码。\n\n在国民大会的格局中，何佩瑢本人以日本陆士的留学背景与北洋时期的地方行政经验，深谙在大势力夹缝中腾挪的生存之道。共和党究竟会在议会政治的拉锯中维持独立姿态，还是在适当时机寻找新的依托，或许取决于何佩瑢对眼前这盘棋局还抱有多少耐心。§!"
 SZC_YCPC_PIP_party: "中国致公党"
 SZC_YCPC_PIP_party_long: "中国致公党\n§L作为陈炯明的亲信，金章成功以粤系背景成功主导了合作政府的致公党党务，他本人出身同盟会，长期浸淫于广东地方政治与法政事务之中，风云广东政界，对联省自治的主张有着源自粤系传统的天然亲近。\n\n在国民大会的格局中，新的合作派致公党依旧以联省自治为核心纲领，主张各省在统一框架下保有充分的自治权限，对任何形式的中央集权均保持警惕。这一立场使致公党成功在现行体制内吸引了地方利益代言人的认可。党内那套横贯海内外的洪门网络也在一定程度上被其重新整合，为金章提供了超越单纯议会政治的组织动员能力。§!"
 SZC_YCPC_KMT_party: "中国国民党"
 SZC_YCPC_KMT_party_long: "中国国民党\n§L基于低调俱乐部改组的新中国国民党，与其说是三民主义的延续，不如说是一面借用旧招牌的政治旗帜。这批脱离汪系的国民党人以正统自居，声称继承孙中山的建国遗志与大亚洲精神，要重新以中日协和为基改造国家。党内成员构成复杂，既有对左派路线心存疑虑的旧党人，也有在新格局下寻找政治依托的投机者，但至少三民主义的旗号将这些来路各异的人暂时捏合在了一起。\n\n在国民大会中，国民党则以与青年党中政会之间维持着一种微妙的张力——既有潜在的合作空间，又存在难以回避的竞争关系。毕竟国民党作为叱咤中华如此多年的大党，可都不甘心屈居人下。§!"
 SZC_YCPC_SDP_party: "中国社会民主党"
 SZC_YCPC_SDP_party_long: "中国社会民主党\n§L中国社会民主党是江亢虎数十年政治流浪的最新落脚点。这位中国社会主义思想的早期传播者，曾创立中国社会党、游历英法，又在北洋乱局中数度组党解党，其思想轨迹从无政府主义到反共新社会主义，再到如今的东亚新秩序论，始终处于漂移之中。\n\n如今社会民主党的纲领以革新社会主义与东亚各民族的文化联合与社会公正为核心，主张超越单纯的阶级斗争框架，在大亚洲主义亲善协和的基础上重建一套有别于欧式社会主义的东方道路。\n\n尽管有三流小道消息表明，如今这个“社会民主党”似乎与三K党有相当的联系——不过那自然是笑话，一个泛亚亲日左翼政党怎么可能和白人至上组织扯上联系？§!"
 SZC_YCPC_ACU_party: "全华联合工会"
 SZC_YCPC_ACU_party_long: "全华联合工会\n§L全华联合工会脱胎于合作政权对华东工运的系统性整编。张克昌以杜月笙恒社出身的工运骨干身份入局，在社会部次长任内将原本零散的工会组织纳入统一管控框架，为合作政府的亲日劳工政策提供了组织基础。\n\n然而，任何拥有真实组织动员能力的机构，迟早都会生长出自己的逻辑。随着全华联合工会在各地工厂与码头扎下根基，它所汇聚的工人群体开始反过来为组织提供更深的权力。在国民大会，全华联合工会成功作为“官方的劳工组织”拿下了许多议席，既讽刺地成为了旧工运的直接继承者，又继续着自己作为外国势力干涉压迫的固定职能。张克昌深知这个组织的双重性质，如何在控制与动员之间维持平衡，或许正是他能否在新政治格局中站稳脚跟的关键所在。§!"
 SZC_YCPC_FAS_party: "战斗法西斯(极政研)"
 SZC_YCPC_FAS_party_long: "中华战斗法西斯 - 极权政策研究会\n§L极权政策研究会是中华战斗法西斯运动的核心派系，由周毓英主导。其意识形态底色更接近墨索里尼的革命行动法西斯——国家对经济的全面统合、对阶级调和的强调，以及对传统右翼保守势力的不信任，使极政研在战斗法西斯运动内部占据了理论制高点。\n\n极政研的主张在国民大会显得格外另类：它既非单纯的民族主义，也非传统意义上的右翼威权，而是试图以法西斯的组织铁律重塑一套中国式的国家统合体制。许多国会成员都对如此左倾的势力深感担忧，甚至日本方面都人对这般“亲共势力”有所意见...§!"
 SZC_YCPC_FASN_party: "战斗法西斯(法青团)"
 SZC_YCPC_FASN_party_long: "中华战斗法西斯 - 中华法西斯青年团\n§L法青团是战斗法西斯运动的青年动员臂膀，以钱旦为精神领袖。钱旦的路线与极政研存在明显的气质差异：他崇尚领袖意志与战斗精神，将武士道式的顽强精神奉为东方民族的精神内核，主张通过塑造钢铁意志的新国民来完成民族再造。在他看来，法西斯独裁的本质是强力的政治，是天才领袖驾驭万民、发展国家的必要手段。\n\n法青团的存在使战斗法西斯运动同时拥有了理论与冲锋队的双重面相。极政研提供路线，法青团输送狂热；两者之间的张力或许正是这个运动最危险也最具活力的地方。§!"

 NKRsichuanCollabDEBUG.2.t: "【绝密·内部传阅】"
 NKRsichuanCollabDEBUG.2.d: "国家安全总局第一处 呈：中央政治行动委员会\n\n根据长江中下游及西南边境情报网的综合反馈，以苗可秀、廖上柯、胡国光为首的违纪开除分子，目前已在川南边缘地带确立了实质性的武装割据据点。该团体利用其前党籍身份的欺骗性，大肆盗用国家主义名义宣扬所谓抗日救亡之异端邪说。\n\n苗可秀作为该非法武装的军事负责人，正利用其在残余人脉建立所谓的国家主义救国游击区。情报显示，苗氏通过洗劫盐税卡点与物流车队非法获取了大量军需储备。他在基层乡间建立了一套名为民兵自卫实为暴力勒索的组织架构，强制征募壮丁，并针对驻地附近的日方军事顾问团成员实施了多次有预谋的狙击暗杀。\n\n廖上柯则利用其早年搜罗的大量左翼文献，将国家主义进行了马克思主义赤匪扭曲化，并在流民与失学青年中散布排日情绪，试图构建伪正统话语。调查表明，廖氏主持的根据地宣传部正有计划地向政府控制区渗透宣传员，散播反日流言。\n\n胡国光则通过与地方流寇、地方本位地主勾结，建立了一套游离于中央财政体系之外的抗日捐征收网络，甚至利用其对前党务通讯密码的了解，干扰我方对边远地区的行政调度。该三人的合流已形成军事割据支撑行政渗透、行政渗透掩护思想污染的恶性循环。国家安全总局判定，若不在华北问题得到处理之前启动大规模的综合性镇压程序，这颗西南毒瘤将严重损害日本对我全民政权执政能力的信任。"
 NKRsichuanCollabDEBUG.2.a: "若是华北问题不得到解决的话..."


 SZC_zhao_yusong: "赵毓松"
 SZC_zhao_yusong_desc: "§Y生于：§!§L1897年12月26日；大清帝国、贵州省黎平府§!\n§Y背景：§!§L赵毓松，变名邵松。少年时期曾前去为贵州袁祖铭部效力，长期作为其私人代表四处活动。在认识到政党政治之力后，赵毓松于1926年11月10日加入中国青年党，并且以袁名义游说孙传芳夹击北伐军。然而，袁祖铭被唐生智部下诱杀，赵毓松只得逃亡北上。\n\n在此之后，赵毓松先后效力于安国军政府与归来的直系北京政府，并且聚集起了一小部分更加专注于权势与金钱的小圈子把持青年党旧派系南迁后的华北党务。许多人称其为华北青年党，但他们自己依旧以青年党华北政务委员会自居，并积极参加复辟清帝国的议会政治。\n\n赵毓松与曾琦的私人关系使得这个“华北青年党”尚未被青年党中央正式除名，但这也为曾琦带来了相当大的压力。§!"
