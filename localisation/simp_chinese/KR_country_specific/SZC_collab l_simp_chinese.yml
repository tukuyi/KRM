fengtian_beijing_conference_events.005.c: "哎呀，拖一拖就好嘛，老子他妈的拖了十几年，还拖不得这几天？"
NKRFengtianManchuria.1.t: "东京的照会"
NKRFengtianManchuria.1.d: "日本外务省已等不及了。一份措辞较前次更为强硬的外交照会经由驻华公使馆递至奉天政府，要求我们在规定期限内就加盟共荣圈、开放新驻军点及满铁扩线事宜给出明确答复。\n\n照会本身尚在外交礼节的边界之内，但其附带的期限要求已释放出清晰的信号——东京方面正失去耐心。我方驻日渠道传回的消息显示，日本内阁与陆军省之间在对华政策上的协调已出现明显摩擦，看起来部分强硬派正在寻求绕过外交程序的途径。"
NKRFengtianManchuria.1.a: "发出一份措辞得体却不作任何实质承诺的回函。"
NKRFengtianManchuria.2.t: "满铁的动作"
NKRFengtianManchuria.2.d: "在外交照会之后，满铁方面率先采取了行动。奉天境内数条原本已谈妥合作条款的铁路项目被单方面叫停，满铁驻奉天事务所的数名负责人已悄然离境回国，同时满铁在若干城市的仓储设施开始出现物资集中转运的迹象。\n\n这些举措很难说是出于商业考量。满铁的经济影响遍及整个东北，其背后的政治意图已不言自明。奉天政府内部对于满铁这一系列动作的解读不一，分歧本身同样是个问题。"
NKRFengtianManchuria.2.a: "继续维持现状，将满铁的动作定性为正常的商业调整。"
NKRFengtianManchuria.3.t: "关东军反应"
NKRFengtianManchuria.3.d: "来自旅顺的情报表明，关东军内部的强硬派已无法接受东京主导的外交方针。他们认为，对奉天的反复妥协已成为整个满洲政策失效的根源，而东京方面的不作为正在坐视局势滑入不可控的轨道。\n\n如果我们再这么拖下去，恐怕局势就要完全脱离控制了..."
NKRFengtianManchuria.3.a: "他妈了个巴子的，还敢把我炸上天不成？"
NKRFengtianManchuria.4.t: "公使警告"
NKRFengtianManchuria.4.d: "日本驻华公使以非正式渠道向奉天政府发出警示：在东京方面看来，当前奉天的拖延策略已引发关东军内部强硬派的极度不满，而大本营对前者的约束力正在减弱。公使馆的这一举动本身便颇为耐人寻味——这既可以理解为东京的善意提醒，也可以理解为一种迂回施压的方式。\n\n无论公使馆的真实意图如何，这份警告所传递的信息是明确的：留给拖字诀的时间已经不多了。"
NKRFengtianManchuria.4.a: "看起来总得做出反应了..."
NKRFengtianManchuria.5.t: "皇姑屯事变"
NKRFengtianManchuria.5.d: "张大帅的专列在经过皇姑屯铁路桥时，遭遇事先布置的炸药袭击。张作霖于当日午后在大帅府不治身亡。\n\n关东军随即以维持地方秩序为由向沈阳增兵，东京大本营尚未对此作出公开表态。奉天政府内部的消息封锁正在努力维持，但局面已难以为继——拖字诀拖到最后，拖来的是这个结果。"
NKRFengtianManchuria.5.a: "稳住局面！"
NKRFengtianManchuria.6.t: "统一大会流产"
NKRFengtianManchuria.6.d: "原定由张作霖主持、召集各省代表重建中央政府的统一大会，已宣告无限期搁置。\n\n大部分代表已低调离去，他们带走了对北方的最后一丝期望。部分代表在返程途中已开始与其他政治势力接触——广州方面、武汉方面，乃至部分独立的省级势力，都在这一时机伸出了接洽之手。奉天作为全国政治中心的设想，至此已彻底成为泡影，而未来中国的权力格局将在一片混沌中重新寻找其重心。"
NKRFengtianManchuria.6.a: "眼下只能先图自保。"
NKRFengtianManchuria.7.t: "关东军越权行动"
NKRFengtianManchuria.7.d: "等待已超出了关东军强硬派所能忍忍的极限。\n\n以保护南满铁路沿线日本侨民为由，关东军各部已开始向奉天境内的若干战略据点发动攻击，行动规模远超任何一次此前被定性为治安维持的单边部署。东京大本营的训令尚在电报线上，而前线的炮声已经响起。\n\n拖字诀最终没有拖过关东军的耐心。"
NKRFengtianManchuria.7.a: "立即召集军政要员，商讨应对方案。"
NKRFengtianManchuria.8.t: "不扩大方针"
NKRFengtianManchuria.8.d: "皇姑屯事变的消息抵达东京后，日本内阁迅速确认关东军此举属于未经授权的独断行动，并宣布采取不扩大方针——公开表示遗憾，以外交途径安抚诸国，同时拒绝对相关责任人展开实质追究。\n\n这一结果对奉天而言意味着三点：东京方面管不住自己的军队已成公开事实；关东军此次独走实际上未受任何惩处，这无疑将成为日后类似行动的先例；而列强在震惊之余的沉默，也进一步明确了奉天在此局中只能依靠自己的现实。"
NKRFengtianManchuria.8.a: "这群鬼子总是这样..."
NKRFengtianManchuria.9.t: "天津军的震惊"
NKRFengtianManchuria.9.d: "关东军的越权行动同样令驻扎天津的日本军方深感措手不及。天津军方面与关东军之间的协调并不充分，这场突如其来的行动将他们置于一个尴尬的位置——关东军已经造成了事实，而天津军必须尽快决定自己站在哪里。\n\n然而震惊过后，天津军方面的反应比外界预料的更快。他们迅速意识到，关东军在满洲的既成事实意味着整个华北的政治格局将不可避免地发生重构，而天津军若不尽快介入这场重构，主导权将彻底落入关东军手中。\n\n天津军的电报开始频繁往来于北京的若干官邸之间。"
NKRFengtianManchuria.9.a: "他们又想干嘛？"
NKRFengtianManchuria.10.t: "北京的合作者"
NKRFengtianManchuria.10.d: "天津军方面的接触对象并不难找。北京城内历来不缺愿意在任何旗帜下谋求一官半职的旧官僚与政客，其中不少人曾与奉天政府维持着若即若离的关系，另一些则是纯粹的机会主义者，其政治立场随局势风向而动。\n\n天津军幕后操盘的核心构想已初步成形：以日本的军事存在为后盾，以北京的旧官僚网络为门面，吸纳北京政府的残余机构充实政权架构，在华北地区建立一个名义上独立、实际上依附于日本的地方政权——所谓维新政府。\n\n这一构想对北京那些旧官僚而言并不陌生。他们见过太多走马灯式更迭的政权，这不过是又一次换旗易帜而已。"
NKRFengtianManchuria.10.a: "..."
NKRFengtianManchuria.11.t: "维新政府的构想"
NKRFengtianManchuria.11.d: "天津军方面已通过中间人向北京政府的部分要员传递了一套相当具体的方案框架。\n\n按照这套方案，北京政府的现有机构将被整合进一个新成立的华北地方政权，政权的正式名称尚未确定，但维新二字已在私下流通。新政权将覆盖华北诸地，对外声称以恢复地方秩序与经济建设为施政重心，实际上则在日本军事存在的框架下运作。\n\n北京政府的现有要员在新政权中将获得一定的职位安排——这是方案中唯一可以称得上诱人的部分。至于东北本土的主权归属，方案中的措辞刻意模糊。"
NKRFengtianManchuria.11.a: "我们大概也没得选了。"
NKRFengtianManchuria.12.t: "中华民国维新政府"
NKRFengtianManchuria.12.d: "华北维新政府在北京正式宣告成立。新政权以直隶与山东为核心辖区，对外则以恢复华北秩序、推进经济建设为施政纲领。\n\n天津军方面的代表出席了成立典礼，但全程以顾问身份列席，并未在台面上显露过多。北京的旧官僚们以一种熟稔的姿态接过了这顶帽子，仿佛不过是换了一块牌匾。\n\n国际社会的反应不温不火。对列强而言，华北又多了一个需要打交道的地方政权，仅此而已。"
NKRFengtianManchuria.12.a: "这顶帽子戴上去容易，摘下来就难了。"


