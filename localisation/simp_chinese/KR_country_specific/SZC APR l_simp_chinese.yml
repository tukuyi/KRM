 NKRYCPAF.1.t: "五色旗运动崛起！"
 NKRYCPAF.1.d: "事情的经过其实谁也说不太清楚。\n\n当然了，如果你非要一个解释的话，据现有的目击者证词整合——大概是这样的：某天，一批中国青年党的网络运营干部和一群莫名其妙被裹挟进来的普通网友，在毫无预兆的情况下，集体从2026年的某个时间节点上消失了。没有闪光，没有异响，没有任何老派穿越文学里那种电闪雷鸣白光一片的仪式感。就这么没了。\n\n然后他们出现在了四川。1936年的四川。\n\n对，就是那个年代。军阀割据，民不聊生。穿越者们环顾四周，发现自己手里拿着手机，口袋里装着移动电源，脑袋里满是21世纪的网络黑话，站在了一片泥泞的1930年代的土地上。\n\n当然，有些事情不太对劲。不只是年代的问题——整个世界的走向就有问题。德国赢得了一战，这一点最先被懂历史的几个人注意到，随后引发了约莫十分钟的集体沉默和若干条对着空气发出的我草。而更离谱的是，抬头望去，地球的各个角落，那些本应五花八门各有旗号的势力，不知为何挂的全是青天白日满地红。不是说国民党势力扩张了——是字面意义上，所有势力，不管什么背景什么立场，旗子都变成了那个东西。没有人能解释这一现象的成因。\n\n五色旗运动就是在这种背景下宣告崛起的。李輊顗，青年党小编之首也莫名其妙在这种背景下被人们推举成为领袖——就连那些这个世界上原来的青年党成员也都纷纷加入。\n\n现在，他们掌握了四川。下一步做什么，还没想好。但至少有个根据地了。"
 NKRYCPAF.1.a: "这是啥？？？"
 NKRYCPAF.2.t: "现状"
 NKRYCPAF.2.d: "穿越者委员会召开了第一次正式会议。\n\n第一项议程的结论：这不是正常的1936年。这一结论用了大约两分钟得出，因为德国赢得一战这件事一旦确认，后续所有的历史偏差都可以视为连锁反应，不需要额外解释。与会人员对这一分析的接受程度出乎意料地高，大概是因为他们本身就是穿越者，已经把不正常设定为了默认认知基准。\n\n第二项议程的结论：全世界遍布青天白日满地红这件事，目前无法解释。有人提出这可能是某种位面属性污染，有人提出可能是平行宇宙的基础意识形态场强制覆盖，但最终的共识都是：不知道，有点搞，，，\n\n第三项议程：我们现在有什么。答案是四川。虽然四川在如今相当落后，但穿越者们莫名带来了一批说不清楚来路的物资、武器，加上若干懂得21世纪生产逻辑的人头，在本地各方势力还没完全反应过来的时候，已经实际控制了几个关键节点。\n\n五色旗运动目前的核心纲领，在这次会议上大致成型。一、反对世界范围内莫名其妙的旗帜统一化，坚持五色旗代表的民国精神。二、在这个位面站稳脚跟，建立可持续的政权运营体系。三、找出那面让全世界都挂上青天白日的幕后黑手，质问他们为什么这么干。"
 NKRYCPAF.2.a: "啥？"
 NKRYCPAF.3.t: "星际战士！"
 NKRYCPAF.3.d: "某天，一批在四川编制下服役的本地士兵，在进行例行训练的时候，不知道是谁翻出了一批从穿越者行李包里掉出来的资料，其中夹着一本设定集，内容是《战锤40000》里星际战士的相关条目。\n\n那本设定集被某个识字的下级军官认真阅读了一遍。\n\n读完之后，他沉默了大约十五分钟，然后找到了上级，提出了一个训练改革方案，核心思路是：我们应该像星际战士一样训练。具体而言，就是在精神层面注入一种极度强化的国家主义信念，以此取代传统军队训练中对恐惧和疼痛的正常反应，从而产生一种类似于人形战争机器的战斗素质。\n\n这个方案在上级那里得到了意想不到的认可。理由很简单：当时的训练成效本来就不理想，反正试试没坏处。\n\n于是，第一批国家主义星际战士就在这种近乎随机的机制下诞生了。效果如何，目前还没有实战数据。\n\n但有一点是可以确认的：这批士兵的士气指标，在可观测范围内，是正常士兵的若干倍。他们不是不知道怕，而是真的相信自己代表了某种比个体生命更大的东西。"
 NKRYCPAF.3.a: "我越来越看不懂了..."
 NKRYCPAF.4.t: "海巡！"
 NKRYCPAF.4.d: "有人在测试信号的时候随手打开了Threads。\n\n能用。\n\n这件事在穿越者群体内部引发的震动，比德国赢得了一战这个消息还要大。因为德国赢得了一战是历史问题，但Threads能用这件事，意味着你现在站在1936年却可以打开手机刷到2026年的社交媒体动态。\n\n这带来了一种非常奇特的存在主义困境：你到底在哪里？\n\n经过约二十分钟的集体哲学讨论，大多数人的结论是：不知道，但既然能刷，那就刷吧。\n\n于是海巡正式成为了五色旗运动的日常活动之一。所谓海巡，是该群体对在Threads上浏览、评论他人内容这一行为的自称。\n\n直播则是另一个分支——有人开始把1936年的四川日常当作直播素材，用一种奇异的历史现场vlog风格向2026年的网友们展示民国年间的日常生活。观看人数据说相当可观，因为受众实在搞不清楚这究竟是精心布置的实景表演，还是某种他们看不懂的行为艺术。"
 NKRYCPAF.4.a: "也不错？"
 NKRYCPAF.5.t: "我驱动"
 NKRYCPAF.5.d: "事情的起因是一批穿越者在某天下午闲得没事，把手机里存着的电影资源翻出来重温。\n\n被翻出来的是《银翼杀手2049》。\n\n看完之后，有人突然开口说了一句话：“我躺下。”\n\n这句话在现场引发了约五秒的沉默，然后是一阵笑声。\n\n但接下来发生了一件更奇怪的事：他开始走路带风，开始沉默地执行各类任务，开始在工作间隙坐在某处发呆，用一种让旁观者说不清楚是深刻还是放空的眼神看向远方。更关键的是，他的这种状态，实际上感染了周围的人。不是全部，但有几个人开始或多或少地以他为参照，真正自己去认为自己是瑞恩高斯林。\n\n没有人认为这是健康的心理状态，但万一呢？"
 NKRYCPAF.5.a: "我进mod。"
 NKRYCPAF.6.t: "孔孟金刚"
 NKRYCPAF.6.d: "没有人知道那个东西是从哪里来的。\n\n它出现在了某个仓库的角落里。一个造型相当奇异的物件，外观混合了若干不同文明的审美符号。\n\n第一个发现它的人叫了几个人过来，大家围着看了一会儿，先后说出了这是啥、我不知道阿和但是很叼这三个判断。\n\n随后的讨论集中在一个问题上：能用吗？经过初步测试，答案是肯定的。它能运作，而且运作方式和任何现有的武器或装备都不太一样。它的力量来源似乎和某种精神状态挂钩，而根据初步观察，孔孟相关的话语和思想框架，能够显著提升其运作效率。\n\n装备被命名为孔孟金刚，命名理由是现场即兴投票的结果，票数最高的那个名字在被念出来的瞬间，所有人都沉默了一秒，然后集体点头表示确实是这个名字。\n\n目前孔孟金刚已经被整合进了军队训练体系，作为最高阶的实战配备存在。没有人完全搞清楚它的全部能力边界，但在已知的测试范围内，结论是：打仗估计很好用。"
 NKRYCPAF.6.a: "这个打仗估计很好用。"
 NKRYCPAF.7.t: "鱼乐至死！哎！"
 NKRYCPAF.7.d: "某天一个成员看到了一个钢铁雄心4 mod的宣传帖，mod名为《命运新生》。\n\n他把这个帖子转到了内部群里附了一句话：这什么东西。\n\n随后有人打开看了一下，回了一句：“确实制作精良，但modder人很烂，非常魔怔，私货玩梗一堆，有点娱乐至死的意味了。”\n\n这引发了一场大讨论：讨论的结果是意见分裂的。有人认为游戏mod不必强求严肃，娱乐是正当目的；有人认为以民国历史为背景的创作，在架空演绎上应当有基本的自我约束；还有人认为这个问题本身就是伪命题，因为鱼乐至死这个群名放在这里，已经把这个讨论的基调定死了——任何严肃的追问在这个命名背景下都会折射成笑话；当然，也有些人声称这个mod绝大多数内容都是在基于现实考究下进行的：好比刘从云真的在现实里面降神、张国焘真的和青年党有联系...但他们的声音常被人忽略。\n\n这场骂战持续时间不长，因为支持者都反过来把鱼乐至死当成了一个反讽笑话，但它在五色旗运动内部留下了一个文化印记：鱼乐至死这个词将永世长存。"
 NKRYCPAF.7.a: "等下，为啥来着？"
 NKRYCPAF.8.t: "新三国"
 NKRYCPAF.8.d: "那天晚上，有人把《新三国》的视频缓存翻了出来。\n\n起因是某个成员提出，他们作为身处乱世的政治势力，应该系统性地研究三国时代的权谋经验。这个提案本身是严肃的，但被执行成了：全员围坐，播放2010年高希希版《新三国》，边看边讨论。\n\n很快，新三国研讨会此后成为了定期活动——基本上就是大家聚在一起看电视，然后感受这玩意到底他妈的有多搞笑。顺便一提，我写不下去事件文本了。"
 NKRYCPAF.8.a: "他就战无不胜！"
 NKRYCPAF.9.t: "世界之国家主义"
 NKRYCPAF.9.d: "五色旗运动在四川站稳之后，内部出现了一种声音：该出去了。\n\n我们本来的目标，是反对那个莫名其妙让全世界都挂上青天白日满地红的东西。这个目标如果只在四川范围内执行，那就永远是局部行动，解决不了根本问题。要解决根本问题，就必须走出去，把五色旗的旗帜带到那些被青天白日覆盖的土地上，重建一种真正多元的政治格局。\n\n反对意见也有。主要是认为现在的基本盘还没稳固，内部的各种机制还没跑通，就急着出去是冒进，可能把好不容易建立起来的一点点东西全毁掉。\n\n但什么叫稳固？在乱世里没有稳固这回事，你以为你在等一个万事俱备的时刻，但那个时刻不会来，有的只是现在。\n\n于是世界国家主义的扩张路线在这次讨论之后基本上算是确定了方向。旗帜已经举起来了，接下来就是出击。"
 NKRYCPAF.9.a: "不错，出击！"
 NKRYCPAF.10.t: "五色旗之寰宇"
 NKRYCPAF.10.d: "似乎一个名为“Hazo”的神秘生物存在被清除了，于是乎——那些曾经铺满了青天白日的区域一块一块地换上了五色旗的颜色，像是有人在用橡皮擦逐渐清除一种覆盖物，露出了下面本来的底色。\n\n这个过程没有人说它容易。扩张的每一步都带着代价，带着在2026年的网络争论里完全不会出现的那种代价——是真实的消耗，是真实的人，是真实地走出去又没有回来。五色旗运动的成员，那批从网络运营系、从鱼乐至死群、从Threads海巡阵地上转进到1936年战场的人有一些已经不在了。\n\n但最后，世界的颜色变了。全世界都是五色旗。\n\n庆祝的方式很节制。没有大规模的游行，没有宏大的声明，有人开了一瓶从穿越行李里找出来的饮料，分着喝完了，然后大家坐在那里沉默了一会儿。有人说了一句五色旗不赖，没有人接话，但所有人都在点头。\n\n然后有人把手机拿出来，打开了Threads，打开了贴吧，打开了QQ，在个人主页上发了一条帖子，内容只有四个字：任务完成。\n\n帖子发出去之后，有人点了赞。是2026年的人。那些还在正常时间线上生活的人，看到了这条帖子，不知道它的来历，不知道它背后是什么，只是觉得这四个字有点莫名的力量，顺手给了一个赞。\n\n发帖的人看到通知，盯着屏幕看了很久，没有回复，把手机放下，继续去做下一件事了。"
 NKRYCPAF.10.a: "五色旗不赖。"
 NKRYCPAF.10.tt: "§m感谢你游玩这个三个小时不到做出来的愚人节内容！爱来自鱼乐至死mod！觉得不错的话可以加我们的QQ群和运营系小编正面对线！§!"